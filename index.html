<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Release to the Moon</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Shippori+Mincho:wght@400;500;600&family=Zen+Kaku+Gothic+New:wght@300;400&display=swap" rel="stylesheet">
<style>
  :root{
    --night-top: #0a0e1c;
    --night-bottom: #131c33;
    --moon-core: #fff8ea;
    --moon-edge: #e9dcc0;
    --berry: #b23a52;
    --berry-soft: rgba(178,58,82,0.55);
    --ink: #d9dce8;
    --whisper: #7c8299;
  }
  *{ box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body{
    margin:0; padding:0; width:100%; height:100%;
    background: radial-gradient(ellipse at 50% 20%, var(--night-bottom) 0%, var(--night-top) 70%);
    overflow:hidden;
    font-family: 'Zen Kaku Gothic New', sans-serif;
    color: var(--ink);
    user-select:none;
  }
  #stage{
    position:relative; width:100vw; height:100vh;
    display:flex; align-items:center; justify-content:center;
  }
  canvas#stars{ position:absolute; inset:0; width:100%; height:100%; }
  canvas#particles{ position:absolute; inset:0; width:100%; height:100%; pointer-events:none; }

  #moon-wrap{
    position:absolute;
    top:42%; left:50%;
    transform: translate(-50%,-50%);
    width: 34vmin; height:34vmin;
    z-index:2;
  }
  #moon-glow{
    position:absolute; inset:-40%;
    border-radius:50%;
    background: radial-gradient(circle, rgba(255,248,234,0.35) 0%, rgba(255,248,234,0.08) 45%, rgba(255,248,234,0) 70%);
    animation: breathe 6s ease-in-out infinite;
  }
  #moon{
    position:absolute; inset:0;
    border-radius:50%;
    background: radial-gradient(circle at 38% 35%, var(--moon-core) 0%, var(--moon-edge) 60%, #cbb98e 100%);
    box-shadow: 0 0 60px rgba(255,248,234,0.25);
    animation: breathe 6s ease-in-out infinite;
  }
  @keyframes breathe{
    0%,100%{ filter:brightness(1); }
    50%{ filter:brightness(1.08); }
  }
  #moon.lit{
    box-shadow: 0 0 110px rgba(255,248,234,0.55), 0 0 200px rgba(178,58,82,0.15);
  }

  #text-layer{
    position:absolute;
    top:0; left:0; width:100%; height:100%;
    display:flex; flex-direction:column; align-items:center; justify-content:flex-end;
    padding: 0 8vw 4vh 8vw;
    z-index:5;
    pointer-events:none;
  }
  .line{
    font-family:'Shippori Mincho', serif;
    font-size: clamp(17px, 2.6vmin, 24px);
    line-height:1.9;
    text-align:center;
    letter-spacing: 0.04em;
    color: var(--ink);
    opacity:0;
    transition: opacity 2.2s ease;
    max-width: 620px;
    text-shadow: 0 2px 12px rgba(10,14,28,0.9);
  }
  .line.show{ opacity:1; }
  .micro{
    font-family:'Zen Kaku Gothic New', sans-serif;
    font-weight:300;
    font-size: clamp(11px, 1.6vmin, 13px);
    color: var(--whisper);
    letter-spacing:0.08em;
    margin-top:14px;
    text-shadow: 0 2px 12px rgba(10,14,28,0.9);
    opacity:0;
    transition: opacity 1.8s ease;
  }
  .micro.show{ opacity:1; }

  #choice-row{
    display:flex; gap:16px; margin-top:26px;
    opacity:0; transform:translateY(6px);
    transition: opacity 1.4s ease, transform 1.4s ease;
    pointer-events:none;
  }
  #choice-row.show{ opacity:1; transform:translateY(0); pointer-events:auto; }
  .choice-btn{
    font-family:'Zen Kaku Gothic New', sans-serif;
    font-weight:300;
    font-size: clamp(12px, 1.7vmin, 14px);
    letter-spacing:0.06em;
    background: transparent;
    color: var(--ink);
    border: 1px solid rgba(217,220,232,0.35);
    border-radius: 999px;
    padding: 11px 26px;
    cursor:pointer;
    transition: border-color 0.6s ease, background 0.6s ease;
  }
  .choice-btn:hover{ border-color: rgba(217,220,232,0.75); background: rgba(217,220,232,0.06); }
  .choice-btn.berry{ border-color: var(--berry-soft); }
  .choice-btn.berry:hover{ background: rgba(178,58,82,0.1); border-color: var(--berry); }

  #input-row{
    display:flex; flex-direction:column; align-items:center; gap:14px;
    margin-top:24px;
    opacity:0; max-height:0; overflow:hidden;
    transition: opacity 1s ease;
    pointer-events:none;
    width:100%;
  }
  #input-row.show{ opacity:1; max-height:200px; pointer-events:auto; }
  #word-input{
    font-family:'Shippori Mincho', serif;
    font-size: clamp(15px, 2vmin, 18px);
    background: transparent;
    border:none;
    border-bottom: 1px solid rgba(217,220,232,0.4);
    color: var(--ink);
    text-align:center;
    padding: 8px 4px;
    width: min(85vw, 420px);
    outline:none;
    letter-spacing:0.04em;
  }
  #word-input::placeholder{ color: rgba(217,220,232,0.3); }
  #submit-word{
    font-family:'Zen Kaku Gothic New', sans-serif;
    font-weight:300;
    font-size: clamp(11px, 1.5vmin, 13px);
    letter-spacing:0.08em;
    background: none; border:none; color: var(--whisper);
    cursor:pointer; padding:4px 10px;
    transition: color 0.5s ease;
  }
  #submit-word:hover{ color: var(--ink); }

  #tap-hint{
    position:absolute; bottom:5vh; left:50%; transform:translateX(-50%);
    font-family:'Zen Kaku Gothic New', sans-serif;
    font-weight:300;
    font-size: 11px;
    letter-spacing:0.1em;
    color: rgba(200,205,225,0.9);
    opacity:0;
    transition: opacity 2s ease;
    z-index:6;
    animation: pulse 3.5s ease-in-out infinite;
  }
  #tap-hint.show{ opacity:1; }
  @keyframes pulse{
    0%,100%{ opacity:0.7; } 50%{ opacity:1; }
  }

  #privacy{
    position:absolute; top:3vh; left:50%; transform:translateX(-50%);
    font-size:10px; letter-spacing:0.05em; color: rgba(124,130,153,0.4);
    text-align:center; max-width:80vw; z-index:6;
    font-family:'Zen Kaku Gothic New', sans-serif; font-weight:300;
  }

  #floating-word{
    position:absolute; top:50%; left:50%; transform:translate(-50%,-50%);
    font-family:'Shippori Mincho', serif;
    font-size: clamp(16px, 2.4vmin, 20px);
    color: rgba(217,220,232,0.9);
    opacity:0; z-index:4; letter-spacing:0.05em;
    pointer-events:none; white-space:nowrap;
  }

  /* ---------- 満月の夜だけの隠し演出 ---------- */
  #hidden-scene{
    position:absolute; inset:0; z-index:8;
    opacity:0; pointer-events:none;
    transition: opacity 4s ease;
  }
  #hidden-scene.show{ opacity:1; pointer-events:auto; }

  #highland-canvas{
    position:absolute; inset:0; width:100%; height:100%;
    pointer-events:none;
  }

  #hidden-text{
    position:absolute; top:10%; left:50%; transform:translateX(-50%);
    text-align:center; width:82%; max-width:540px;
    font-family:'Shippori Mincho', serif;
    font-size: clamp(13px, 1.9vmin, 16px);
    line-height:2.1;
    color: rgba(210,218,235,0.88);
    text-shadow: 0 2px 16px rgba(5,10,25,0.95);
    letter-spacing: 0.03em;
    pointer-events: none;
  }
  #sound-toggle{
    position:absolute; bottom:6vh; left:50%; transform:translateX(-50%);
    font-family:'Zen Kaku Gothic New', sans-serif;
    font-weight:300; font-size:12px; letter-spacing:0.08em;
    background:none; border:1px solid rgba(217,220,232,0.35);
    color:var(--ink); border-radius:999px; padding:9px 22px;
    cursor:pointer; z-index:2;
  }
  #sound-toggle:hover{ border-color: rgba(217,220,232,0.7); }

  /* ---------- 月→クローバー変化オーバーレイ ---------- */
  #clover-canvas{
    position:absolute; inset:0; width:100%; height:100%;
    pointer-events:none; z-index:3;
  }

  /* ---------- 小鳥シーン ---------- */
  #bird-canvas{
    position:absolute; inset:0; width:100%; height:100%;
    pointer-events:none; z-index:4;
    opacity:0; transition: opacity 2.4s ease;
  }
  #bird-canvas.show{ opacity:1; }

  #word-reveal{
    position:absolute; bottom:14vh; left:50%; transform:translateX(-50%);
    text-align:center; width:88%; max-width:560px;
    font-family:'Shippori Mincho', serif;
    font-size: clamp(30px, 4.4vmin, 40px);
    line-height:1.95;
    color: rgba(225,232,248,0.93);
    text-shadow: 0 2px 18px rgba(5,10,28,0.96);
    letter-spacing: 0.04em;
    pointer-events:none; z-index:6;
  }
  #word-reveal .w{
    display:inline-block;
    opacity:0;
    transform: translateY(5px);
    transition: opacity 0.7s ease, transform 0.7s ease;
    margin: 0 0.18em;
  }
  #word-reveal .w.on{ opacity:1; transform:translateY(0); }
  #word-reveal .br{ display:block; height:0.5em; }
</style>
</head>
<body>
<div id="stage">
  <canvas id="stars"></canvas>
  <div id="moon-wrap">
    <div id="moon-glow"></div>
    <div id="moon"></div>
  </div>
  <canvas id="particles"></canvas>
  <canvas id="clover-canvas"></canvas>
  <canvas id="bird-canvas"></canvas>
  <div id="word-reveal"></div>
  <div id="floating-word"></div>

  <div id="privacy">This stays only within you. Nothing you write is ever sent or saved.</div>

  <div id="text-layer">
    <p class="line" id="line-main"></p>
    <p class="micro" id="line-micro"></p>
    <div id="choice-row">
      <button class="choice-btn berry" id="btn-write">Write</button>
      <button class="choice-btn" id="btn-close">Gently close</button>
    </div>
    <div id="input-row">
      <input type="text" id="word-input" placeholder="" maxlength="40">
      <button id="submit-word"></button>
    </div>
  </div>
  <div id="tap-hint">Touch the screen to continue</div>

  <div id="hidden-scene">
    <canvas id="highland-canvas"></canvas>
    <div id="hidden-text">
      Under the same full moon —<br>
      on Highland hills where the heather sways,<br>
      and in fields of pampas grass where the wind breathes —<br>
      people danced. They were looking up at the same moon.
    </div>
    <button id="sound-toggle">Listen, softly</button>
  </div>
  <audio id="furusato-audio" src="audio/furusato-no-sora.mp3" preload="none" loop></audio>
</div>

<script>
(function(){
  "use strict";

  // ---------- 星の背景 ----------
  const starsCanvas = document.getElementById('stars');
  const sctx = starsCanvas.getContext('2d');
  const particlesCanvas = document.getElementById('particles');
  const pctx = particlesCanvas.getContext('2d');
  const cloverCanvas = document.getElementById('clover-canvas');
  const cctx = cloverCanvas.getContext('2d');
  const birdCanvas = document.getElementById('bird-canvas');
  const bctx = birdCanvas.getContext('2d');
  let W, H, DPR;

  function resize(){
    DPR = Math.min(window.devicePixelRatio || 1, 2);
    W = window.innerWidth; H = window.innerHeight;
    [starsCanvas, particlesCanvas, cloverCanvas, birdCanvas].forEach(c=>{
      c.width = W*DPR; c.height = H*DPR;
      c.style.width = W+"px"; c.style.height = H+"px";
    });
    sctx.setTransform(DPR,0,0,DPR,0,0);
    pctx.setTransform(DPR,0,0,DPR,0,0);
    cctx.setTransform(DPR,0,0,DPR,0,0);
    bctx.setTransform(DPR,0,0,DPR,0,0);
  }
  window.addEventListener('resize', resize);
  resize();

  const stars = [];
  const STAR_COUNT = 140;
  for(let i=0;i<STAR_COUNT;i++){
    stars.push({
      x: Math.random()*W,
      y: Math.random()*H*0.85,
      r: Math.random()*1.3 + 0.2,
      baseA: Math.random()*0.6+0.15,
      tw: Math.random()*Math.PI*2,
      speed: Math.random()*0.02+0.005
    });
  }

  function drawStars(t){
    sctx.clearRect(0,0,W,H);
    stars.forEach(s=>{
      const a = s.baseA + Math.sin(t*s.speed + s.tw)*0.2;
      sctx.beginPath();
      sctx.arc(s.x, s.y, s.r, 0, Math.PI*2);
      sctx.fillStyle = `rgba(230,235,250,${Math.max(0,a)})`;
      sctx.fill();
    });
  }

  // ---------- 粒子（ラズベリーの光 / 解放の光）----------
  let particles = [];
  function spawnBerry(x,y){
    particles.push({
      type:'berry',
      x, y, targetY:y,
      r: 0,
      maxR: Math.random()*2.5+2.5,
      a:0,
      life:0,
      phase:'grow'
    });
  }
  function spawnRelease(x,y,isBerry){
    particles.push({
      type: isBerry ? 'berry-release' : 'light',
      x, y,
      vx: (Math.random()-0.5)*0.3,
      vy: -(Math.random()*0.6+0.35),
      r: isBerry ? (Math.random()*2+2) : (Math.random()*1.5+0.6),
      a: 1,
      life:0
    });
  }

  function updateParticles(){
    pctx.clearRect(0,0,W,H);
    particles = particles.filter(p=>{
      p.life += 1;
      if(p.type==='berry'){
        if(p.phase==='grow'){
          p.r += (p.maxR - p.r)*0.08;
          p.a = Math.min(1, p.a+0.03);
          if(p.r > p.maxR-0.1) p.phase='hold';
        }
        pctx.beginPath();
        pctx.arc(p.x, p.y, p.r, 0, Math.PI*2);
        pctx.fillStyle = `rgba(178,58,82,${0.75*p.a})`;
        pctx.shadowColor = 'rgba(178,58,82,0.6)';
        pctx.shadowBlur = 8;
        pctx.fill();
        pctx.shadowBlur = 0;
        return true;
      } else {
        p.x += p.vx; p.y += p.vy;
        p.a -= 0.006;
        const color = p.type==='berry-release' ? '178,58,82' : '245,241,230';
        pctx.beginPath();
        pctx.arc(p.x, p.y, p.r, 0, Math.PI*2);
        pctx.fillStyle = `rgba(${color},${Math.max(0,p.a)})`;
        pctx.shadowColor = `rgba(${color},0.7)`;
        pctx.shadowBlur = 6;
        pctx.fill();
        pctx.shadowBlur = 0;
        return p.a > 0 && p.y > -20;
      }
    });
  }

  let t0 = 0;
  function loop(t){
    t0 = t/1000;
    drawStars(t0);
    updateParticles();
    requestAnimationFrame(loop);
  }
  requestAnimationFrame(loop);

  // ---------- シーン制御 ----------
  const lineMain = document.getElementById('line-main');
  const lineMicro = document.getElementById('line-micro');
  const choiceRow = document.getElementById('choice-row');
  const inputRow = document.getElementById('input-row');
  const wordInput = document.getElementById('word-input');
  const submitWord = document.getElementById('submit-word');
  const tapHint = document.getElementById('tap-hint');
  const moonEl = document.getElementById('moon');
  const floatingWord = document.getElementById('floating-word');
  const stage = document.getElementById('stage');

  let scene = 'intro';
  let userWord = '';
  const moonRect = ()=>document.getElementById('moon-wrap').getBoundingClientRect();

  function setLine(text, micro){
    lineMain.classList.remove('show');
    lineMicro.classList.remove('show');
    setTimeout(()=>{
      lineMain.innerHTML = text || '';
      lineMicro.innerHTML = micro || '';
      requestAnimationFrame(()=>{
        lineMain.classList.add('show');
        if(micro) lineMicro.classList.add('show');
      });
    }, text ? 300 : 0);
  }

  function hideChoices(){
    choiceRow.classList.remove('show');
    inputRow.classList.remove('show');
  }

  function goIntro(){
    scene='intro';
    hideChoices();
    tapHint.classList.remove('show');
    hiddenScene.classList.remove('show');
    if(highlandRAF){ cancelAnimationFrame(highlandRAF); highlandRAF=null; hctx.clearRect(0,0,window.innerWidth,window.innerHeight); }
    if(birdRAF){ cancelAnimationFrame(birdRAF); birdRAF=null; }
    birdCanvas.classList.remove('show');
    bctx.clearRect(0,0,W,H);
    const _wr = document.getElementById('word-reveal');
    if(_wr) _wr.innerHTML = '';
    if(audioPlaying){ furusatoAudio.pause(); furusatoAudio.currentTime=0; audioPlaying=false; soundToggle.textContent='Listen, softly'; }
    setLine('', '');
    setTimeout(()=>{
      setLine('Buck Moon.', '');
      setTimeout(()=> tapHint.classList.add('show'), 2600);
    }, 600);
  }

  function goPrompt(){
    scene='prompt';
    tapHint.classList.remove('show');
    setLine('Is there something you\u2019d like to let go of?', '');
    setTimeout(()=>{
      choiceRow.classList.add('show');
    }, 1800);
  }

  function goWriting(){
    scene='writing';
    hideChoices();
    setLine('<span style="color:#6aa3d5;">Would you like to put it into words?</span>', '');
    setTimeout(()=>{
      inputRow.classList.add('show');
      wordInput.focus();
    }, 1200);
  }

  function finishWithWord(word){
    userWord = word.trim();
    hideChoices();
    if(userWord){
      setLine('', '');
      // 浮かぶ文字 → 月へ吸い込まれる
      floatingWord.textContent = userWord;
      floatingWord.style.transition = 'none';
      floatingWord.style.opacity = '0';
      floatingWord.style.transform = 'translate(-50%,-50%) scale(1)';
      requestAnimationFrame(()=>{
        floatingWord.style.transition = 'opacity 1.2s ease';
        floatingWord.style.opacity = '0.9';
      });
      setTimeout(()=>{
        const mr = moonRect();
        floatingWord.style.transition = 'all 2.4s cubic-bezier(0.4,0,0.2,1)';
        floatingWord.style.transform = 'translate(-50%,-50%) scale(0.3)';
        floatingWord.style.opacity = '0';
        floatingWord.style.top = '50%';
        floatingWord.style.left = '50%';
        moonEl.classList.add('lit');
      }, 1400);
      setTimeout(()=>{ moonEl.classList.remove('lit'); goBerries(); }, 4200);
    } else {
      setLine('Even words unspoken,', 'are enough as they are');
      setTimeout(()=> goBerries(), 3400);
    }
  }

  function goBerries(){
    scene='berries';
    hideChoices();
    setLine('Summer\u2019s fruit glows around the moon.', '');
    const mr = moonRect();
    const cx = mr.left + mr.width/2;
    const cy = mr.top + mr.height/2;
    const radius = mr.width*0.85;
    let count = 0;
    const totalBerries = 7;
    const interval = setInterval(()=>{
      const angle = Math.random()*Math.PI*2;
      const dist = radius + Math.random()*40;
      spawnBerry(cx + Math.cos(angle)*dist, cy + Math.sin(angle)*dist*0.6);
      count++;
      if(count >= totalBerries){
        clearInterval(interval);
        setTimeout(()=>{
          moonToClover();
        }, 1800);
      }
    }, 550);
  }

  // ---------- 月 → レッドクローバー変化 ----------
  // 先端がやや尖った葉のパス（ベジェ曲線）
  function leafPath(ctx, hw, hl){
    ctx.beginPath();
    ctx.moveTo(0, -hl);                               // 先端（少し尖る）
    ctx.bezierCurveTo( hw*0.9, -hl*0.55,  hw, hl*0.2,  hw*0.35, hl*0.82);  // 右
    ctx.bezierCurveTo( hw*0.15, hl,        0,  hl*0.95,  0, hl);            // 右→底
    ctx.bezierCurveTo(-hw*0.15, hl,       -hw*0.35, hl*0.82, -hw, hl*0.2); // 底→左
    ctx.bezierCurveTo(-hw*0.9, -hl*0.55,  0, -hl,  0, -hl);                // 左→先端
    ctx.closePath();
  }

  // レッドクローバーの葉（尖り気味＋薄い緑＋白いV字）
  function drawTrifoliate(ctx, bx, by, leafR, angle, alpha){
    const leafAngles = [-Math.PI/6, Math.PI/2, Math.PI + Math.PI/6];
    leafAngles.forEach(la => {
      const lx = bx + Math.cos(angle + la) * leafR * 0.9;
      const ly = by + Math.sin(angle + la) * leafR * 0.9;
      ctx.save();
      ctx.translate(lx, ly);
      ctx.rotate(angle + la + Math.PI/2);

      // 葉身（やや尖った形・薄い緑）
      const lGrad = ctx.createRadialGradient(0, -leafR*0.2, 0, 0, leafR*0.1, leafR*0.95);
      lGrad.addColorStop(0,   `rgba(130,185,105,${alpha*0.92})`);
      lGrad.addColorStop(0.5, `rgba(100,160, 80,${alpha*0.88})`);
      lGrad.addColorStop(1,   `rgba( 75,130, 58,${alpha*0.65})`);
      leafPath(ctx, leafR*0.56, leafR*0.9);
      ctx.fillStyle = lGrad;
      ctx.fill();

      // 中央脈
      ctx.strokeStyle = `rgba(155,210,120,${alpha*0.45})`;
      ctx.lineWidth = leafR * 0.06;
      ctx.lineCap = 'round';
      ctx.beginPath();
      ctx.moveTo(0, leafR*0.82);
      ctx.lineTo(0, -leafR*0.82);
      ctx.stroke();

      // 白いV字模様
      ctx.strokeStyle = `rgba(220,235,210,${alpha*0.52})`;
      ctx.lineWidth = leafR * 0.085;
      ctx.lineCap = 'round';
      ctx.lineJoin = 'round';
      ctx.beginPath();
      ctx.moveTo(-leafR*0.28, 0);
      ctx.lineTo(0, -leafR*0.16);
      ctx.lineTo(leafR*0.28, 0);
      ctx.stroke();

      ctx.restore();
    });

    // 葉柄
    ctx.save();
    ctx.strokeStyle = `rgba(100,155,75,${alpha*0.55})`;
    ctx.lineWidth = leafR * 0.085;
    ctx.lineCap = 'round';
    leafAngles.forEach(la => {
      const lx = bx + Math.cos(angle + la) * leafR * 0.9;
      const ly = by + Math.sin(angle + la) * leafR * 0.9;
      ctx.beginPath();
      ctx.moveTo(bx, by);
      ctx.lineTo(lx, ly);
      ctx.stroke();
    });
    ctx.restore();
  }

  // 個々の小花を描く（花びらが外向きに開く）
  function drawFloret(ctx, px, py, size, outAngle, alpha){
    const PETAL = 5;
    for(let p = 0; p < PETAL; p++){
      const pa = outAngle + (p / PETAL) * Math.PI * 2;
      const tipX = px + Math.cos(pa) * size * 1.0;
      const tipY = py + Math.sin(pa) * size * 0.92;
      const midX = px + Math.cos(pa) * size * 0.48;
      const midY = py + Math.sin(pa) * size * 0.44;
      const lx   = px + Math.cos(pa - 0.55) * size * 0.42;
      const ly   = py + Math.sin(pa - 0.55) * size * 0.38;
      const rx   = px + Math.cos(pa + 0.55) * size * 0.42;
      const ry   = py + Math.sin(pa + 0.55) * size * 0.38;

      // 花びらグラデーション（根元が白っぽく、先端が濃い赤紫）
      const pGrad = ctx.createLinearGradient(px, py, tipX, tipY);
      pGrad.addColorStop(0,    `rgba(245,195,215,${alpha*0.9})`);
      pGrad.addColorStop(0.35, `rgba(205,100,148,${alpha*0.95})`);
      pGrad.addColorStop(0.75, `rgba(168, 52,110,${alpha*0.95})`);
      pGrad.addColorStop(1,    `rgba(140, 35, 88,${alpha*0.85})`);

      ctx.beginPath();
      ctx.moveTo(px, py);
      ctx.quadraticCurveTo(lx, ly, tipX, tipY);
      ctx.quadraticCurveTo(rx, ry, px, py);
      ctx.fillStyle = pGrad;
      ctx.fill();

      // 花びら中央の細い筋
      ctx.save();
      ctx.globalAlpha = alpha * 0.3;
      ctx.strokeStyle = `rgba(220,140,175,1)`;
      ctx.lineWidth = size * 0.07;
      ctx.lineCap = 'round';
      ctx.beginPath();
      ctx.moveTo(midX, midY);
      ctx.lineTo(tipX, tipY);
      ctx.stroke();
      ctx.restore();
    }

    // 小花の中心（白→薄黄）
    const cGrad = ctx.createRadialGradient(px, py, 0, px, py, size*0.28);
    cGrad.addColorStop(0,   `rgba(255,252,235,${alpha*0.98})`);
    cGrad.addColorStop(0.6, `rgba(235,215,170,${alpha*0.85})`);
    cGrad.addColorStop(1,   `rgba(200,170,110,${alpha*0.5})`);
    ctx.beginPath();
    ctx.arc(px, py, size * 0.28, 0, Math.PI*2);
    ctx.fillStyle = cGrad;
    ctx.fill();
  }

  // 画像に近いレッドクローバー花頭
  function drawFlowerHead(ctx, fx, fy, fr, alpha){
    // 外側グロー
    const glow = ctx.createRadialGradient(fx, fy - fr*0.1, 0, fx, fy, fr * 1.6);
    glow.addColorStop(0,   `rgba(210,100,145,${alpha*0.32})`);
    glow.addColorStop(0.6, `rgba(180, 60,115,${alpha*0.1})`);
    glow.addColorStop(1,   `rgba(150, 40, 95,0)`);
    ctx.beginPath();
    ctx.arc(fx, fy, fr * 1.6, 0, Math.PI*2);
    ctx.fillStyle = glow;
    ctx.fill();

    // がく（sepal）：尖った緑の三角形を花底に並べる
    const SEPAL = 10;
    for(let s = 0; s < SEPAL; s++){
      const sa = (s / SEPAL) * Math.PI * 2 + 0.15;
      const sx = fx + Math.cos(sa) * fr * 0.5;
      const sy = fy + fr * 0.36 + Math.sin(sa) * fr * 0.22;
      const tipSx = fx + Math.cos(sa) * fr * 0.85;
      const tipSy = sy + fr * 0.38;
      ctx.save();
      ctx.globalAlpha = alpha * 0.88;
      ctx.fillStyle = `rgba(85,138,58,1)`;
      ctx.beginPath();
      ctx.moveTo(sx - fr*0.06, sy);
      ctx.lineTo(tipSx, tipSy);
      ctx.lineTo(sx + fr*0.06, sy);
      ctx.closePath();
      ctx.fill();
      ctx.restore();
    }

    // 花托（緑のドーム底部）
    const recGrad = ctx.createRadialGradient(fx, fy + fr*0.22, 0, fx, fy + fr*0.1, fr*0.58);
    recGrad.addColorStop(0, `rgba(110,158,72,${alpha*0.92})`);
    recGrad.addColorStop(1, `rgba( 72,112,46,${alpha*0.6})`);
    ctx.beginPath();
    ctx.ellipse(fx, fy + fr*0.28, fr*0.52, fr*0.28, 0, 0, Math.PI*2);
    ctx.fillStyle = recGrad;
    ctx.fill();

    // 小花を球面に配置（外周4層）
    const layers = [
      { count: 12, elevFrac: 0.0, rScale: 0.82, yOff: 0.0,  sizeF: 0.21 }, // 外周
      { count: 10, elevFrac: 0.3, rScale: 0.62, yOff: 0.28, sizeF: 0.195 },
      { count:  8, elevFrac: 0.6, rScale: 0.38, yOff: 0.52, sizeF: 0.178 },
      { count:  4, elevFrac: 1.0, rScale: 0.12, yOff: 0.75, sizeF: 0.16  }, // 頂部
    ];

    layers.forEach((layer, li) => {
      for(let i = 0; i < layer.count; i++){
        const az = (i / layer.count) * Math.PI * 2 + li * 0.38;
        const px = fx + Math.cos(az) * fr * layer.rScale;
        const py = fy - fr * layer.yOff + Math.sin(az) * fr * layer.rScale * 0.48;
        const floretSize = fr * layer.sizeF;
        // 外向き角度（球面の法線方向）
        const outAngle = Math.atan2(py - (fy - fr*0.3), px - fx);
        drawFloret(ctx, px, py, floretSize, outAngle, alpha);
      }
    });

    // 全体球形にうっすら色をのせる
    const overlay = ctx.createRadialGradient(fx - fr*0.18, fy - fr*0.28, 0, fx, fy, fr*0.92);
    overlay.addColorStop(0,   `rgba(240,160,195,${alpha*0.18})`);
    overlay.addColorStop(0.7, `rgba(175, 58,115,${alpha*0.1})`);
    overlay.addColorStop(1,   `rgba(145, 40, 95,0)`);
    ctx.beginPath();
    ctx.arc(fx, fy, fr * 0.92, 0, Math.PI*2);
    ctx.fillStyle = overlay;
    ctx.fill();
  }

  function drawCloverShape(ctx, cx, cy, r, alpha){
    ctx.save();

    // --- 茎（太め、やや湾曲）---
    const stemBot = { x: cx + r*0.05, y: cy + r*1.35 };
    const stemTop = { x: cx,          y: cy + r*0.3  };
    ctx.strokeStyle = `rgba(105,158,78,${alpha*0.82})`;
    ctx.lineWidth   = r * 0.11;
    ctx.lineCap = 'round';
    ctx.beginPath();
    ctx.moveTo(stemBot.x, stemBot.y);
    ctx.bezierCurveTo(
      stemBot.x + r*0.1, stemBot.y - r*0.5,
      stemTop.x - r*0.05, stemTop.y + r*0.4,
      stemTop.x, stemTop.y
    );
    ctx.stroke();

    // 茎の産毛（細い短線を散らす）
    ctx.strokeStyle = `rgba(140,190,105,${alpha*0.22})`;
    ctx.lineWidth = r * 0.025;
    for(let i = 0; i < 10; i++){
      const tt = i / 10;
      const hx = cx + (stemBot.x - cx) * (1 - tt);
      const hy = cy + r*0.3 + (stemBot.y - cy - r*0.3) * (1 - tt);
      const side = (i % 2 === 0 ? 1 : -1);
      ctx.beginPath();
      ctx.moveTo(hx, hy);
      ctx.lineTo(hx + side * r*0.08, hy - r*0.04);
      ctx.stroke();
    }

    // --- 下部の三つ葉（茎中段・0.6倍） ---
    drawTrifoliate(ctx, cx - r*0.04, cy + r*0.78, r*0.38*0.6, -Math.PI/10, alpha);

    // --- 上部の三つ葉（花の直下・0.6倍） ---
    drawTrifoliate(ctx, cx, cy + r*0.32, r*0.32*0.6, Math.PI/12, alpha);

    // --- 花頭（1.5倍） ---
    drawFlowerHead(ctx, cx, cy - r*0.22, r*0.55*1.5, alpha);

    ctx.restore();
  }

  function moonToClover(){
    scene = 'moon-transform';
    tapHint.classList.remove('show');

    const mr = moonRect();
    const cx = mr.left + mr.width / 2;
    const cy = mr.top  + mr.height / 2;
    const moonR = mr.width / 2;

    const DURATION = 4200; // ms
    const startTime = performance.now();

    // ベリーパーティクルを消す
    particles = particles.filter(p => p.type !== 'berry');

    function animFrame(now){
      const elapsed = now - startTime;
      const t = Math.min(elapsed / DURATION, 1); // 0→1
      const ease = t < 0.5 ? 2*t*t : -1+(4-2*t)*t; // ease-in-out

      cctx.clearRect(0, 0, W, H);

      // 月をフェードアウト（CSSではなくcanvasで重ねて消す）
      if(t < 0.85){
        const moonFade = 1 - Math.min(t / 0.7, 1);
        cctx.save();
        cctx.globalAlpha = (1 - moonFade);
        // 月の上にベールをかける（背景色で塗りつぶし）
        const veilGrad = cctx.createRadialGradient(cx, cy, 0, cx, cy, moonR * 1.6);
        veilGrad.addColorStop(0,   `rgba(15,20,40,${(1-moonFade)*0.92})`);
        veilGrad.addColorStop(0.7, `rgba(15,20,40,${(1-moonFade)*0.6})`);
        veilGrad.addColorStop(1,   `rgba(15,20,40,0)`);
        cctx.beginPath();
        cctx.arc(cx, cy, moonR * 1.6, 0, Math.PI * 2);
        cctx.fillStyle = veilGrad;
        cctx.fill();
        cctx.restore();
      } else {
        // 月を完全に覆う
        cctx.save();
        const veilGrad = cctx.createRadialGradient(cx, cy, 0, cx, cy, moonR * 1.6);
        veilGrad.addColorStop(0,   `rgba(15,20,40,0.92)`);
        veilGrad.addColorStop(0.7, `rgba(15,20,40,0.6)`);
        veilGrad.addColorStop(1,   `rgba(15,20,40,0)`);
        cctx.beginPath();
        cctx.arc(cx, cy, moonR * 1.6, 0, Math.PI * 2);
        cctx.fillStyle = veilGrad;
        cctx.fill();
        cctx.restore();
      }

      // クローバーをフェードイン（t > 0.3 から）
      if(t > 0.28){
        const cloverAlpha = Math.min((t - 0.28) / 0.55, 1);
        const cloverR = moonR * 0.62 * (0.35 + 0.65 * Math.min((t-0.28)/0.4, 1));
        // cy + moonR*0.3 → 花頭が月の中心付近、茎が下方へ伸びる配置
        drawCloverShape(cctx, cx, cy + moonR * 0.3, cloverR, cloverAlpha);
      }

      if(t < 1){
        requestAnimationFrame(animFrame);
      } else {
        // 変化完了 → しばらく表示してからタップ待ちへ
        setLine('Something gentle, blooming here.', '');
        setTimeout(()=>{
          // クローバーをゆっくりフェードアウト
          let fadeT = 0;
          function fadeOut(){
            fadeT += 0.006;
            cctx.clearRect(0, 0, W, H);
            if(fadeT < 1){
              const a = 1 - fadeT;
              // ベール維持
              const veilGrad = cctx.createRadialGradient(cx, cy, 0, cx, cy, moonR * 1.6);
              veilGrad.addColorStop(0,   `rgba(15,20,40,${0.92 * a})`);
              veilGrad.addColorStop(0.7, `rgba(15,20,40,${0.6 * a})`);
              veilGrad.addColorStop(1,   `rgba(15,20,40,0)`);
              cctx.save();
              cctx.beginPath();
              cctx.arc(cx, cy, moonR * 1.6, 0, Math.PI * 2);
              cctx.fillStyle = veilGrad;
              cctx.fill();
              cctx.restore();
              drawCloverShape(cctx, cx, cy + moonR*0.3, moonR*0.62, a);
              requestAnimationFrame(fadeOut);
            } else {
              cctx.clearRect(0, 0, W, H);
              goBirdScene();
            }
          }
          requestAnimationFrame(fadeOut);
        }, 12000);
      }
    }
    requestAnimationFrame(animFrame);
  }

  // ---------- 小鳥シーン ----------
  let birdRAF = null;

  // ── ヘルパー：色を線形補間 ──
  function lerpC(a, b, t){
    return a.map((v,i)=> Math.round(v + (b[i]-v)*t));
  }

  // ── 鷹を描画する関数 ──
  function drawHawk(ctx, cx, cy, size, wingSpread, alpha, morphT){
    // morphT: 0=シマエナガ, 1=鷹
    ctx.save();
    ctx.globalAlpha = alpha;

    // 体色：白→茶色（鷹）
    const bodyColor = lerpC([255,255,255], [120,75,30], morphT);
    const wingColor = lerpC([195,205,230], [80,50,20], morphT);
    const bellyColor = lerpC([240,244,252], [200,175,120], morphT);

    // 翼（左右に大きく広がる）
    const wSpan = size * (1.2 + wingSpread * 2.2);
    [-1, 1].forEach(side=>{
      ctx.save();
      ctx.translate(cx + side * size * 0.15, cy - size * 0.05);
      // 翼の形（ベジェで鷹らしい翼型）
      const wTip = side * wSpan;
      const wMid = side * wSpan * 0.55;
      const wDip = size * (0.18 + wingSpread * 0.3);  // 翼の反り
      ctx.beginPath();
      ctx.moveTo(0, 0);
      ctx.bezierCurveTo(wMid*0.4, -wDip*0.5, wMid*0.85, -wDip, wMid, -wDip*0.2);
      ctx.bezierCurveTo(wMid*1.1, wDip*0.1, wTip*0.85, wDip*0.3, wTip, wDip*0.15);
      ctx.bezierCurveTo(wTip*0.9, wDip*0.6, wMid*1.1, wDip*0.7, wMid*0.6, wDip*0.55);
      ctx.bezierCurveTo(wMid*0.2, wDip*0.4, 0, wDip*0.2, 0, 0);
      ctx.closePath();
      const wGrad = ctx.createLinearGradient(0, -wDip, wTip, wDip*0.5);
      wGrad.addColorStop(0,   `rgba(${wingColor[0]},${wingColor[1]},${wingColor[2]},0.92)`);
      wGrad.addColorStop(0.5, `rgba(${lerpC(wingColor,[60,38,14],0.4).join(',')},0.88)`);
      wGrad.addColorStop(1,   `rgba(${lerpC(wingColor,[40,28,10],0.6).join(',')},0.75)`);
      ctx.fillStyle = wGrad;
      ctx.fill();
      // 羽根の筋
      ctx.strokeStyle = `rgba(${lerpC([200,210,235],[50,32,10],morphT).join(',')},0.35)`;
      ctx.lineWidth = size*0.018;
      for(let wi=0; wi<6; wi++){
        const wf = wi/5;
        ctx.beginPath();
        ctx.moveTo(wMid*wf*0.3, wDip*wf*0.1);
        ctx.lineTo(wTip*wf + side*size*0.1*(1-wf), wDip*(0.15+wf*0.3));
        ctx.stroke();
      }
      ctx.restore();
    });

    // 尾羽（鷹らしい扇形）
    ctx.save();
    const tailLen = size * (1.2 + morphT * 0.8);
    const tailSpread = size * (0.35 + morphT * 0.45);
    for(let ti=-2; ti<=2; ti++){
      const ta = (ti/3) * (0.4 + morphT*0.25);
      ctx.strokeStyle = `rgba(${lerpC([75,78,100],[90,58,20],morphT).join(',')},0.85)`;
      ctx.lineWidth = size*0.065;
      ctx.lineCap = 'round';
      ctx.beginPath();
      ctx.moveTo(cx + Math.sin(ta)*size*0.18, cy + size*0.45);
      ctx.bezierCurveTo(
        cx + Math.sin(ta)*tailSpread*0.5, cy + tailLen*0.6,
        cx + Math.sin(ta)*tailSpread*0.85, cy + tailLen*0.85,
        cx + Math.sin(ta)*tailSpread, cy + tailLen
      );
      ctx.stroke();
    }
    ctx.restore();

    // 腹部（白〜薄茶）
    const bellyGrad = ctx.createRadialGradient(cx, cy+size*0.1, 0, cx, cy, size*0.7);
    bellyGrad.addColorStop(0,   `rgba(${bellyColor.join(',')},0.92)`);
    bellyGrad.addColorStop(0.6, `rgba(${lerpC(bellyColor,bodyColor,0.5).join(',')},0.82)`);
    bellyGrad.addColorStop(1,   `rgba(${bodyColor.join(',')},0.4)`);
    ctx.beginPath();
    ctx.ellipse(cx, cy + size*0.05, size*0.42, size*0.52, 0, 0, Math.PI*2);
    ctx.fillStyle = bellyGrad;
    ctx.fill();

    // 体本体（上半分）
    const bodyGrad2 = ctx.createRadialGradient(cx-size*0.15, cy-size*0.2, 0, cx, cy, size*0.72);
    bodyGrad2.addColorStop(0,   `rgba(${lerpC(bodyColor,[200,165,100],0.3).join(',')},0.95)`);
    bodyGrad2.addColorStop(0.55, `rgba(${bodyColor.join(',')},0.88)`);
    bodyGrad2.addColorStop(1,   `rgba(${lerpC(bodyColor,[60,40,15],0.5).join(',')},0.55)`);
    ctx.beginPath();
    ctx.ellipse(cx, cy - size*0.05, size*(0.55 - morphT*0.08), size*(0.62 - morphT*0.08), 0, 0, Math.PI*2);
    ctx.fillStyle = bodyGrad2;
    ctx.fill();

    // 頭部
    const headR = size * (0.42 - morphT*0.06);
    const headX = cx - size*(0.05 - morphT*0.08);
    const headY = cy - size*(0.5 + morphT*0.05);
    const headGrad = ctx.createRadialGradient(headX-headR*0.2, headY-headR*0.2, 0, headX, headY, headR);
    headGrad.addColorStop(0,   `rgba(${lerpC([255,255,255],[145,95,40],morphT).join(',')},0.97)`);
    headGrad.addColorStop(0.6, `rgba(${lerpC([230,238,252],[100,65,25],morphT).join(',')},0.9)`);
    headGrad.addColorStop(1,   `rgba(${lerpC([190,205,235],[70,45,18],morphT).join(',')},0.6)`);
    ctx.beginPath();
    ctx.arc(headX, headY, headR, 0, Math.PI*2);
    ctx.fillStyle = headGrad;
    ctx.fill();

    // 鷹の頭の暗い模様（morphT > 0.3から）
    if(morphT > 0.3){
      const maskA = (morphT - 0.3) / 0.7;
      ctx.save();
      ctx.globalAlpha = maskA * 0.75;
      ctx.fillStyle = `rgba(55,35,10,0.85)`;
      ctx.beginPath();
      ctx.ellipse(headX + headR*0.25, headY + headR*0.1, headR*0.3, headR*0.22, 0.5, 0, Math.PI*2);
      ctx.fill();
      ctx.restore();
    }

    // 目
    const eyeX = headX + headR*(0.22 + morphT*0.08);
    const eyeY = headY + headR*0.05;
    const eyeR = headR*(0.13 + morphT*0.04);
    ctx.fillStyle = 'rgba(18,18,22,0.97)';
    ctx.beginPath();
    ctx.arc(eyeX, eyeY, eyeR, 0, Math.PI*2);
    ctx.fill();
    // 鷹の鋭い目（黄色の虹彩）
    if(morphT > 0.5){
      const irisA = (morphT-0.5)/0.5;
      ctx.save();
      ctx.globalAlpha = irisA*0.9;
      const irisGrad = ctx.createRadialGradient(eyeX, eyeY, 0, eyeX, eyeY, eyeR*1.5);
      irisGrad.addColorStop(0,   'rgba(18,18,22,1)');
      irisGrad.addColorStop(0.45,'rgba(180,130,20,0.95)');
      irisGrad.addColorStop(1,   'rgba(140,95,10,0)');
      ctx.beginPath();
      ctx.arc(eyeX, eyeY, eyeR*1.5, 0, Math.PI*2);
      ctx.fillStyle = irisGrad;
      ctx.fill();
      ctx.restore();
    }
    ctx.fillStyle = 'rgba(255,255,255,0.92)';
    ctx.beginPath();
    ctx.arc(eyeX + eyeR*0.35, eyeY - eyeR*0.35, eyeR*0.32, 0, Math.PI*2);
    ctx.fill();

    // くちばし（シマエナガ→鷹の鉤型へ）
    ctx.save();
    ctx.fillStyle = `rgba(${lerpC([80,75,65],[55,45,10],morphT).join(',')},0.92)`;
    if(morphT < 0.5){
      // シマエナガのくちばし
      ctx.beginPath();
      ctx.moveTo(eyeX + headR*0.15, eyeY + headR*0.06);
      ctx.lineTo(eyeX + headR*(0.38 + morphT*0.2), eyeY + headR*0.12);
      ctx.lineTo(eyeX + headR*0.15, eyeY + headR*0.18);
      ctx.closePath();
      ctx.fill();
    } else {
      // 鷹の鉤型くちばし
      const bkA = (morphT-0.5)/0.5;
      const bkSize = headR*(0.28 + bkA*0.18);
      ctx.beginPath();
      ctx.moveTo(eyeX + headR*0.15, eyeY + headR*0.02);
      ctx.bezierCurveTo(
        eyeX + headR*0.5, eyeY - headR*0.04,
        eyeX + headR*(0.5 + bkA*0.2), eyeY + headR*(0.1 + bkA*0.18),
        eyeX + headR*(0.32 + bkA*0.1), eyeY + headR*(0.22 + bkA*0.18)
      );
      ctx.lineTo(eyeX + headR*0.15, eyeY + headR*0.14);
      ctx.closePath();
      ctx.fill();
    }
    ctx.restore();

    ctx.restore();
  }

  // ── 飛翔する鷹（画面外へ）──
  function drawFlyingHawk(ctx, cx, cy, size, angle, alpha){
    ctx.save();
    ctx.globalAlpha = alpha;
    ctx.translate(cx, cy);
    ctx.rotate(angle);
    // 翼（大きく広げた状態）
    [-1,1].forEach(side=>{
      ctx.save();
      const wSpan = size*2.8;
      ctx.strokeStyle = 'rgba(95,62,22,0.82)';
      ctx.fillStyle = 'rgba(105,68,25,0.78)';
      ctx.beginPath();
      ctx.moveTo(0, 0);
      ctx.bezierCurveTo(side*wSpan*0.3, -size*0.3, side*wSpan*0.75, -size*0.22, side*wSpan, size*0.12);
      ctx.bezierCurveTo(side*wSpan*0.85, size*0.45, side*wSpan*0.5, size*0.5, 0, size*0.28);
      ctx.closePath();
      ctx.fill();
      ctx.restore();
    });
    // 体
    ctx.fillStyle = 'rgba(110,70,25,0.88)';
    ctx.beginPath();
    ctx.ellipse(0, 0, size*0.28, size*0.55, 0, 0, Math.PI*2);
    ctx.fill();
    // 腹
    ctx.fillStyle = 'rgba(195,170,115,0.75)';
    ctx.beginPath();
    ctx.ellipse(0, size*0.1, size*0.18, size*0.32, 0, 0, Math.PI*2);
    ctx.fill();
    // 尾羽
    for(let ti=-2;ti<=2;ti++){
      ctx.strokeStyle = 'rgba(88,56,18,0.78)';
      ctx.lineWidth = size*0.08;
      ctx.lineCap='round';
      ctx.beginPath();
      ctx.moveTo(ti*size*0.1, size*0.48);
      ctx.lineTo(ti*size*0.22, size*0.9);
      ctx.stroke();
    }
    // 頭
    ctx.fillStyle = 'rgba(130,88,35,0.92)';
    ctx.beginPath();
    ctx.arc(0, -size*0.48, size*0.22, 0, Math.PI*2);
    ctx.fill();
    // 目
    ctx.fillStyle = 'rgba(18,18,20,0.95)';
    ctx.beginPath();
    ctx.arc(size*0.08, -size*0.5, size*0.06, 0, Math.PI*2);
    ctx.fill();
    ctx.fillStyle='rgba(255,255,255,0.9)';
    ctx.beginPath();
    ctx.arc(size*0.10, -size*0.53, size*0.022, 0, Math.PI*2);
    ctx.fill();
    ctx.restore();
  }

  function drawBirdScene(t){
    const w = W, h = H;
    bctx.clearRect(0, 0, w, h);

    // ────────────────────────────────────
    // フェーズ定義
    //  Phase A: 0  ~ 10s  シマエナガが枝の上でくるくる回転
    //  Phase B: 10 ~ 14s  鷹へグラデーション変化
    //  Phase C: 14 ~ 28s  鷹が四方八方に飛翔、夜明け背景
    // ────────────────────────────────────
    const PHASE_A_END  = 10;
    const PHASE_B_END  = 14;
    const PHASE_C_END  = 28;

    const inA = t < PHASE_A_END;
    const inB = t >= PHASE_A_END && t < PHASE_B_END;
    const inC = t >= PHASE_B_END;

    // morphT: 0=シマエナガ 1=鷹（フェーズBで0→1）
    const morphT = inA ? 0 : inB ? Math.min((t - PHASE_A_END)/(PHASE_B_END - PHASE_A_END), 1) : 1;

    // 夜明け進行度（フェーズBから明けていく）
    const dawnT = inA ? 0 : inB ? Math.min((t - PHASE_A_END)/4, 1)*0.3
                             : Math.min((t - PHASE_B_END)/(PHASE_C_END - PHASE_B_END), 1);

    // ── 背景：深夜→夜明け ──
    const sky = bctx.createLinearGradient(0, 0, 0, h);
    // 上
    const nightTop  = [8,12,32];
    const dawnTop   = [45,30,68];
    const cTop = lerpC(nightTop, dawnTop, dawnT);
    // 中
    const nightMid  = [18,24,58];
    const dawnMid   = [180,95,60];
    const cMid = lerpC(nightMid, dawnMid, dawnT);
    // 下
    const nightBot  = [12,10,28];
    const dawnBot   = [235,155,70];
    const cBot = lerpC(nightBot, dawnBot, dawnT);

    sky.addColorStop(0,    `rgba(${cTop.join(',')},0.97)`);
    sky.addColorStop(0.45, `rgba(${lerpC(cTop,cMid,0.5).join(',')},0.96)`);
    sky.addColorStop(0.75, `rgba(${cMid.join(',')},0.94)`);
    sky.addColorStop(1,    `rgba(${cBot.join(',')},0.97)`);
    bctx.fillStyle = sky;
    bctx.fillRect(0, 0, w, h);

    // 夜明けの光（地平線上のグロー）
    if(dawnT > 0){
      const horizY = h * 0.65;
      const sunGrad = bctx.createRadialGradient(w*0.5, horizY, 0, w*0.5, horizY, w*0.55);
      sunGrad.addColorStop(0,   `rgba(255,200,80,${dawnT*0.55})`);
      sunGrad.addColorStop(0.3, `rgba(240,130,50,${dawnT*0.28})`);
      sunGrad.addColorStop(0.7, `rgba(200,80,40,${dawnT*0.10})`);
      sunGrad.addColorStop(1,   'rgba(150,50,30,0)');
      bctx.fillStyle = sunGrad;
      bctx.fillRect(0, 0, w, h);
    }

    // ── 星（夜明けとともに消えていく）──
    const starAlpha = Math.max(0, 1 - dawnT*1.6);
    if(starAlpha > 0){
      const starData = [
        [0.08,0.07,0.9],[0.18,0.04,0.7],[0.32,0.11,1.0],[0.45,0.05,0.8],
        [0.62,0.09,0.9],[0.73,0.03,0.6],[0.85,0.07,1.0],[0.91,0.13,0.7],
        [0.12,0.18,0.6],[0.28,0.15,0.8],[0.55,0.17,0.7],[0.78,0.12,0.9],
        [0.04,0.28,0.5],[0.38,0.22,0.6],[0.67,0.25,0.8],[0.94,0.20,0.7],
      ];
      starData.forEach(([sx,sy,br],i)=>{
        const twinkle = 0.55 + 0.45*Math.sin(t*0.9 + i*1.7);
        bctx.beginPath();
        bctx.arc(sx*w, sy*h, 1.1*br, 0, Math.PI*2);
        bctx.fillStyle = `rgba(220,228,248,${twinkle*br*starAlpha})`;
        bctx.fill();
      });
    }

    // ── 三日月（夜明けとともに薄れる）──
    if(dawnT < 0.8){
      const moonA = Math.max(0, 1 - dawnT/0.8);
      const mox = w*0.82, moy = h*0.12, mr = w*0.048;
      bctx.save();
      bctx.globalAlpha = moonA;
      bctx.beginPath();
      bctx.arc(mox, moy, mr, -0.35, Math.PI+0.35);
      bctx.fillStyle = 'rgba(235,235,210,0.92)';
      bctx.fill();
      bctx.beginPath();
      bctx.arc(mox + mr*0.38, moy - mr*0.08, mr*0.84, -0.55, Math.PI+0.55);
      bctx.fillStyle = 'rgba(14,20,48,0.98)';
      bctx.fill();
      bctx.restore();
    }

    // ── 遠景の丘と湖 ──
    const hillColor = lerpC([22,28,52],[60,45,30],dawnT*0.7);
    bctx.fillStyle = `rgba(${hillColor.join(',')},0.88)`;
    bctx.beginPath();
    bctx.moveTo(0, h);
    [[0,0.82],[0.12,0.74],[0.25,0.70],[0.38,0.73],[0.50,0.68],[0.62,0.72],[0.75,0.68],[0.88,0.72],[1,0.76]].forEach(([px,py])=>
      bctx.lineTo(px*w, py*h));
    bctx.lineTo(w, h);
    bctx.closePath();
    bctx.fill();

    // 湖面の反射（夜明けは橙〜赤）
    const refX = w*0.62, refY = h*0.82;
    const refColor = dawnT > 0.1 ? `rgba(255,${Math.round(160+dawnT*60)},${Math.round(80-dawnT*50)},` : 'rgba(220,225,200,';
    const refGrad = bctx.createRadialGradient(refX, refY, 0, refX, refY, w*0.14);
    refGrad.addColorStop(0,   `${refColor}${0.22+dawnT*0.15})`);
    refGrad.addColorStop(0.5, `${refColor}0.08)`);
    refGrad.addColorStop(1,   `${refColor}0)`);
    bctx.save();
    bctx.scale(1, 0.28);
    bctx.beginPath();
    bctx.ellipse(refX, refY/0.28, w*0.1, w*0.1, 0, 0, Math.PI*2);
    bctx.fillStyle = refGrad;
    bctx.fill();
    bctx.restore();

    // ────────────────────────────────────
    // フェーズA / B: 枝の上でシマエナガ → 鷹へ変化
    // ────────────────────────────────────
    if(!inC){
      // ── 枝（フェーズABのみ表示）──
      const branchX0 = w*0.05, branchY0 = h*0.58;
      const branchX1 = w*0.70, branchY1 = h*0.47;
      bctx.save();
      bctx.strokeStyle = 'rgba(62,58,75,0.92)';
      bctx.lineWidth = w*0.0055;
      bctx.lineCap = 'round';
      bctx.beginPath();
      bctx.moveTo(branchX0, branchY0);
      bctx.bezierCurveTo(w*0.25, h*0.52, w*0.48, h*0.50, branchX1, branchY1);
      bctx.stroke();
      // 小枝
      const twigs = [
        {t:0.18,dx:-0.04,dy:-0.06,len:0.09,a:-0.6},{t:0.32,dx:-0.02,dy:-0.08,len:0.07,a:-0.8},
        {t:0.55,dx:0.01,dy:-0.07,len:0.08,a:-0.5},{t:0.72,dx:0.03,dy:-0.09,len:0.06,a:-0.7},
        {t:0.85,dx:0.02,dy:-0.06,len:0.05,a:-0.4},{t:0.22,dx:-0.03,dy:0.05,len:0.06,a:0.5},
        {t:0.65,dx:0.02,dy:0.04,len:0.05,a:0.6},
      ];
      bctx.lineWidth = w*0.002;
      bctx.strokeStyle = 'rgba(58,54,70,0.78)';
      twigs.forEach(tw=>{
        const bx2 = branchX0 + (branchX1-branchX0)*tw.t;
        const by2 = branchY0 + (branchY1-branchY0)*tw.t;
        bctx.beginPath();
        bctx.moveTo(bx2, by2);
        bctx.lineTo(bx2 + Math.cos(tw.a)*tw.len*w, by2 + Math.sin(tw.a)*tw.len*h*0.5);
        bctx.stroke();
      });
      bctx.restore();

      // ── 回転するシマエナガ→鷹 ──
      // 枝の上の定位置を中心に回転
      const pivotX = w * 0.35;
      const pivotY = h * 0.47;
      const birdR  = Math.min(w, h) * 0.10;

      // フェーズA: 10秒かけて1回転（2π）
      const spinAngle = inA ? (t / PHASE_A_END) * Math.PI * 2 : Math.PI * 2;
      // 回転による位置オフセット（小さな円軌道）
      const orbitR = birdR * 0.35;
      const birdCX = pivotX + Math.sin(spinAngle) * orbitR;
      const birdCY = pivotY + Math.cos(spinAngle) * orbitR * 0.4;

      // 翼の広がり：変化フェーズBで翼が開く
      const wingSpread = morphT;

      bctx.save();
      bctx.translate(birdCX, birdCY);
      bctx.rotate(Math.sin(spinAngle) * 0.15); // 体のわずかな傾き
      bctx.translate(-birdCX, -birdCY);
      drawHawk(bctx, birdCX, birdCY, birdR, wingSpread, 1.0, morphT);
      bctx.restore();
    }

    // ────────────────────────────────────
    // フェーズC: 鷹が四方八方に飛翔
    // ────────────────────────────────────
    if(inC){
      const ct = t - PHASE_B_END; // 0~ (フェーズC内の時間)
      const totalC = PHASE_C_END - PHASE_B_END; // 14s

      // 鷹が複数方向に飛んでいく（時間差で）
      const hawks = [
        {delay:0.0, angle:-Math.PI/2,        // 真上
          sx:0.5, sy:0.55, speed:0.068},
        {delay:2.5, angle:-Math.PI/6,         // 右上
          sx:0.45, sy:0.58, speed:0.060},
        {delay:4.5, angle:Math.PI+Math.PI/5,  // 左下
          sx:0.52, sy:0.52, speed:0.055},
        {delay:6.0, angle:-Math.PI*0.78,      // 左上
          sx:0.5, sy:0.55, speed:0.062},
        {delay:8.0, angle:Math.PI/4,          // 右下
          sx:0.48, sy:0.56, speed:0.058},
        {delay:10.0, angle:-Math.PI*0.15,     // 右
          sx:0.5, sy:0.53, speed:0.065},
      ];

      hawks.forEach((hk, hi)=>{
        const localT = ct - hk.delay;
        if(localT < 0) return;
        const dist = localT * hk.speed * Math.max(w, h);
        const hx = hk.sx*w + Math.cos(hk.angle)*dist;
        const hy = hk.sy*h + Math.sin(hk.angle)*dist;
        // 画面外に出たら描画しない
        if(hx < -w*0.3 || hx > w*1.3 || hy < -h*0.3 || hy > h*1.3) return;
        const hSize = Math.min(w,h) * (0.07 - hi*0.003);
        // フェードイン（0.5秒）
        const fadeIn = Math.min(localT/0.5, 1);
        // 遠ざかるにつれて小さく・薄く
        const progress = dist / (Math.max(w,h)*0.8);
        const scale = Math.max(0.25, 1 - progress*0.6);
        const alpha = fadeIn * Math.max(0.1, 1 - progress*0.75);
        // 羽ばたき角度（上下に揺れる翼）
        const flapAngle = hk.angle + Math.sin(localT*4.5)*0.22;
        drawFlyingHawk(bctx, hx, hy, hSize*scale, flapAngle - Math.PI/2, alpha);
      });

      // 光の軌跡（鷹が通った後に輝く粒）
      if(ct > 0.5){
        hawks.forEach((hk, hi)=>{
          const localT = ct - hk.delay - 0.3;
          if(localT < 0) return;
          for(let pi=0; pi<5; pi++){
            const pT = localT - pi*0.4;
            if(pT < 0) continue;
            const pdist = pT * hk.speed * Math.max(w,h);
            const px2 = hk.sx*w + Math.cos(hk.angle)*pdist;
            const py2 = hk.sy*h + Math.sin(hk.angle)*pdist;
            if(px2 < -w*0.2 || px2 > w*1.2 || py2 < -h*0.2 || py2 > h*1.2) continue;
            const trailA = Math.max(0, 0.35 - pi*0.07 - pT*0.04);
            bctx.beginPath();
            bctx.arc(px2, py2, 3 - pi*0.4, 0, Math.PI*2);
            bctx.fillStyle = `rgba(255,${200+dawnT*55|0},${80+dawnT*80|0},${trailA})`;
            bctx.fill();
          }
        });
      }
    }

    // ── 輝く葉（フェーズA・Bのみ）──
    if(!inC){
      const leafData = [
        {bx:0.52, by:0.46, phase:0.0, speed:0.22, drift:0.018},
        {bx:0.60, by:0.43, phase:1.3, speed:0.18, drift:0.024},
        {bx:0.66, by:0.48, phase:2.5, speed:0.20, drift:0.015},
        {bx:0.70, by:0.41, phase:0.8, speed:0.25, drift:0.020},
        {bx:0.76, by:0.44, phase:3.5, speed:0.17, drift:0.022},
        {bx:0.82, by:0.38, phase:1.8, speed:0.23, drift:0.016},
      ];
      leafData.forEach((ld, i)=>{
        const age = (t*ld.speed + ld.phase) % 1.0;
        const lx = (ld.bx + age*ld.drift*8 + Math.sin(t*0.4+i)*0.03) * w;
        const ly = (ld.by - age*0.12 + Math.sin(t*0.5+i*0.9)*0.025) * h;
        const lAlpha = age < 0.2 ? age/0.2 : age > 0.75 ? (1-age)/0.25 : 1;
        const lRot = t*0.3 + ld.phase + Math.sin(t*0.35+i)*0.4;
        const lSize = w * (0.022 + Math.sin(i*0.7)*0.006);
        bctx.save();
        bctx.translate(lx, ly);
        bctx.rotate(lRot);
        bctx.globalAlpha = lAlpha * 0.88;
        const leafGlow = bctx.createRadialGradient(0, 0, 0, 0, 0, lSize*1.6);
        leafGlow.addColorStop(0,   'rgba(210,225,245,0.45)');
        leafGlow.addColorStop(0.5, 'rgba(180,205,235,0.18)');
        leafGlow.addColorStop(1,   'rgba(150,185,225,0)');
        bctx.beginPath();
        bctx.ellipse(0, 0, lSize*1.6, lSize*1.0, 0, 0, Math.PI*2);
        bctx.fillStyle = leafGlow;
        bctx.fill();
        bctx.beginPath();
        bctx.moveTo(0, -lSize);
        bctx.bezierCurveTo(lSize*0.7, -lSize*0.5, lSize*0.8, lSize*0.3, 0, lSize);
        bctx.bezierCurveTo(-lSize*0.8, lSize*0.3, -lSize*0.7, -lSize*0.5, 0, -lSize);
        bctx.fillStyle = 'rgba(215,228,248,0.72)';
        bctx.fill();
        bctx.strokeStyle = 'rgba(240,245,255,0.5)';
        bctx.lineWidth = 0.8;
        bctx.beginPath();
        bctx.moveTo(0, -lSize*0.85);
        bctx.lineTo(0, lSize*0.85);
        bctx.stroke();
        bctx.restore();
      });
    }

    // ── きらめき（フェーズA・B）──
    if(!inC){
      const sparklePos = [
        [0.58,0.38],[0.65,0.44],[0.72,0.35],[0.79,0.41],[0.86,0.36],[0.68,0.30]
      ];
      sparklePos.forEach(([sx,sy],i)=>{
        const sPhase = t*1.2 + i*1.1;
        const sBright = 0.5 + 0.5*Math.sin(sPhase);
        const sX = sx*w + Math.sin(t*0.2+i)*w*0.008;
        const sY = sy*h + Math.cos(t*0.25+i)*h*0.012;
        const sR = w*0.005 * sBright;
        bctx.save();
        bctx.globalAlpha = sBright * 0.85;
        bctx.fillStyle = 'rgba(255,248,210,0.95)';
        bctx.translate(sX, sY);
        bctx.rotate(t*0.2+i);
        bctx.beginPath();
        for(let sp=0;sp<8;sp++){
          const sAngle = sp/8*Math.PI*2;
          const sLen = sp%2===0 ? sR : sR*0.4;
          sp===0 ? bctx.moveTo(Math.cos(sAngle)*sLen, Math.sin(sAngle)*sLen)
                 : bctx.lineTo(Math.cos(sAngle)*sLen, Math.sin(sAngle)*sLen);
        }
        bctx.closePath();
        bctx.fill();
        bctx.restore();
      });
    }

    // ── 最前景の草むら ──
    const grassColor = lerpC([8,10,22],[35,28,15],dawnT*0.5);
    bctx.fillStyle = `rgba(${grassColor.join(',')},0.94)`;
    bctx.beginPath();
    bctx.moveTo(0, h);
    [[0,0.93],[0.05,0.88],[0.10,0.91],[0.15,0.86],[0.20,0.90],[0.28,0.87],
     [0.35,0.91],[0.42,0.87],[0.50,0.92],[0.58,0.88],[0.66,0.91],[0.74,0.87],
     [0.82,0.91],[0.90,0.88],[0.96,0.92],[1.0,0.90]].forEach(([px,py])=>
      bctx.lineTo(px*w, py*h));
    bctx.lineTo(w, h);
    bctx.closePath();
    bctx.fill();
  }

    // ── 星（固定seed）──
    const starData = [
      [0.08,0.07,0.9],[0.18,0.04,0.7],[0.32,0.11,1.0],[0.45,0.05,0.8],
      [0.62,0.09,0.9],[0.73,0.03,0.6],[0.85,0.07,1.0],[0.91,0.13,0.7],
      [0.12,0.18,0.6],[0.28,0.15,0.8],[0.55,0.17,0.7],[0.78,0.12,0.9],
      [0.04,0.28,0.5],[0.38,0.22,0.6],[0.67,0.25,0.8],[0.94,0.20,0.7],
    ];
    starData.forEach(([sx,sy,br],i)=>{
      const twinkle = 0.55 + 0.45*Math.sin(t*0.9 + i*1.7);
      bctx.beginPath();
      bctx.arc(sx*w, sy*h, 1.1*br, 0, Math.PI*2);
      bctx.fillStyle = `rgba(220,228,248,${twinkle*br})`;
      bctx.fill();
    });

    // ── 三日月（右上）──
    const mox = w*0.82, moy = h*0.12, mr = w*0.048;
    bctx.save();
    bctx.beginPath();
    bctx.arc(mox, moy, mr, -0.35, Math.PI+0.35);
    bctx.fillStyle = 'rgba(235,235,210,0.92)';
    bctx.fill();
    bctx.beginPath();
    bctx.arc(mox + mr*0.38, moy - mr*0.08, mr*0.84, -0.55, Math.PI+0.55);
    bctx.fillStyle = 'rgba(14,20,48,0.98)';
    bctx.fill();
    // 月の縁のグロー
    const moonGlow = bctx.createRadialGradient(mox, moy, 0, mox, moy, mr*2.5);
    moonGlow.addColorStop(0,   'rgba(230,228,195,0.15)');
    moonGlow.addColorStop(0.5, 'rgba(200,205,230,0.06)');
    moonGlow.addColorStop(1,   'rgba(170,180,220,0)');
    bctx.beginPath();
    bctx.arc(mox, moy, mr*2.5, 0, Math.PI*2);
    bctx.fillStyle = moonGlow;
    bctx.fill();
    bctx.restore();

    // ── 遠景の丘と湖 ──
    const horizonY = h*0.72;
    // 湖の水面反射（月明かり）
    const lakeGrad = bctx.createLinearGradient(0, horizonY, 0, h*0.88);
    lakeGrad.addColorStop(0,   'rgba(25,32,68,0.88)');
    lakeGrad.addColorStop(0.5, 'rgba(18,24,50,0.94)');
    lakeGrad.addColorStop(1,   'rgba(10,14,32,0.97)');
    bctx.fillStyle = lakeGrad;
    bctx.fillRect(0, horizonY, w, h - horizonY);

    // 水面の月明かり反射
    const refX = w*0.62, refY = h*0.82;
    const refGrad = bctx.createRadialGradient(refX, refY, 0, refX, refY, w*0.12);
    refGrad.addColorStop(0,   `rgba(220,225,200,${0.18+Math.sin(t*1.1)*0.04})`);
    refGrad.addColorStop(0.4, 'rgba(180,195,220,0.07)');
    refGrad.addColorStop(1,   'rgba(140,160,200,0)');
    bctx.save();
    bctx.scale(1, 0.28);
    bctx.beginPath();
    bctx.ellipse(refX, refY/0.28, w*0.1, w*0.1, 0, 0, Math.PI*2);
    bctx.fillStyle = refGrad;
    bctx.fill();
    bctx.restore();

    // 丘シルエット
    bctx.fillStyle = 'rgba(22,28,52,0.88)';
    bctx.beginPath();
    bctx.moveTo(0, h);
    [[0,0.82],[0.12,0.74],[0.25,0.70],[0.38,0.73],[0.50,0.68],[0.62,0.72],[0.75,0.68],[0.88,0.72],[1,0.76]].forEach(([px,py])=>
      bctx.lineTo(px*w, py*h));
    bctx.lineTo(w, h);
    bctx.closePath();
    bctx.fill();

    // ── 枝（左から右へ斜め）──
    const branchX0 = w*0.05, branchY0 = h*0.58;
    const branchX1 = w*0.70, branchY1 = h*0.47;
    bctx.save();
    bctx.strokeStyle = 'rgba(62,58,75,0.92)';
    bctx.lineWidth = w*0.0055;
    bctx.lineCap = 'round';
    bctx.beginPath();
    bctx.moveTo(branchX0, branchY0);
    bctx.bezierCurveTo(w*0.25, h*0.52, w*0.48, h*0.50, branchX1, branchY1);
    bctx.stroke();

    // 細い小枝たち
    const twigs = [
      {t:0.18, dx:-0.04, dy:-0.06, len:0.09, a:-0.6},
      {t:0.32, dx:-0.02, dy:-0.08, len:0.07, a:-0.8},
      {t:0.55, dx: 0.01, dy:-0.07, len:0.08, a:-0.5},
      {t:0.72, dx: 0.03, dy:-0.09, len:0.06, a:-0.7},
      {t:0.85, dx: 0.02, dy:-0.06, len:0.05, a:-0.4},
      {t:0.22, dx:-0.03, dy: 0.05, len:0.06, a: 0.5},
      {t:0.65, dx: 0.02, dy: 0.04, len:0.05, a: 0.6},
    ];
    bctx.lineWidth = w*0.002;
    bctx.strokeStyle = 'rgba(58,54,70,0.78)';
    twigs.forEach(twig=>{
      const bx = branchX0 + (branchX1-branchX0)*twig.t;
      const by = branchY0 + (branchY1-branchY0)*twig.t;
      bctx.beginPath();
      bctx.moveTo(bx, by);
      bctx.lineTo(bx + Math.cos(twig.a)*twig.len*w, by + Math.sin(twig.a)*twig.len*h*0.5);
      bctx.stroke();
      // 小枝の芽
      bctx.fillStyle = 'rgba(75,72,88,0.7)';
      bctx.beginPath();
      bctx.ellipse(bx + Math.cos(twig.a)*twig.len*w, by + Math.sin(twig.a)*twig.len*h*0.5, 2.5, 4, twig.a, 0, Math.PI*2);
      bctx.fill();
    });
    bctx.restore();

    // ── 輝く葉（風に舞う）──
    const leafData = [
      {bx:0.52, by:0.46, phase:0.0, speed:0.22, drift:0.018},
      {bx:0.60, by:0.43, phase:1.3, speed:0.18, drift:0.024},
      {bx:0.66, by:0.48, phase:2.5, speed:0.20, drift:0.015},
      {bx:0.70, by:0.41, phase:0.8, speed:0.25, drift:0.020},
      {bx:0.76, by:0.44, phase:3.5, speed:0.17, drift:0.022},
      {bx:0.82, by:0.38, phase:1.8, speed:0.23, drift:0.016},
    ];
    leafData.forEach((ld, i)=>{
      const age = (t*ld.speed + ld.phase) % 1.0;
      const lx = (ld.bx + age*ld.drift*8 + Math.sin(t*0.4+i)*0.03) * w;
      const ly = (ld.by - age*0.12 + Math.sin(t*0.5+i*0.9)*0.025) * h;
      const lAlpha = age < 0.2 ? age/0.2 : age > 0.75 ? (1-age)/0.25 : 1;
      const lRot = t*0.3 + ld.phase + Math.sin(t*0.35+i)*0.4;
      const lSize = w * (0.022 + Math.sin(i*0.7)*0.006);

      bctx.save();
      bctx.translate(lx, ly);
      bctx.rotate(lRot);
      bctx.globalAlpha = lAlpha * 0.88;

      // 葉の輝き（外側グロー）
      const leafGlow = bctx.createRadialGradient(0, 0, 0, 0, 0, lSize*1.6);
      leafGlow.addColorStop(0,   'rgba(210,225,245,0.45)');
      leafGlow.addColorStop(0.5, 'rgba(180,205,235,0.18)');
      leafGlow.addColorStop(1,   'rgba(150,185,225,0)');
      bctx.beginPath();
      bctx.ellipse(0, 0, lSize*1.6, lSize*1.0, 0, 0, Math.PI*2);
      bctx.fillStyle = leafGlow;
      bctx.fill();

      // 葉本体（半透明・光る白）
      bctx.beginPath();
      bctx.moveTo(0, -lSize);
      bctx.bezierCurveTo(lSize*0.7, -lSize*0.5, lSize*0.8, lSize*0.3, 0, lSize);
      bctx.bezierCurveTo(-lSize*0.8, lSize*0.3, -lSize*0.7, -lSize*0.5, 0, -lSize);
      bctx.fillStyle = 'rgba(215,228,248,0.72)';
      bctx.fill();

      // 葉脈
      bctx.strokeStyle = 'rgba(240,245,255,0.5)';
      bctx.lineWidth = 0.8;
      bctx.beginPath();
      bctx.moveTo(0, -lSize*0.85);
      bctx.lineTo(0, lSize*0.85);
      bctx.stroke();
      [-0.45,-0.15,0.2,0.5].forEach(yf=>{
        bctx.beginPath();
        bctx.moveTo(0, lSize*yf);
        bctx.lineTo(lSize*0.55, lSize*(yf+0.15));
        bctx.moveTo(0, lSize*yf);
        bctx.lineTo(-lSize*0.55, lSize*(yf+0.15));
        bctx.stroke();
      });

      // 光の粒
      bctx.globalAlpha = lAlpha * 0.7;
      bctx.fillStyle = 'rgba(255,252,220,0.9)';
      bctx.beginPath();
      bctx.arc(lSize*0.15, -lSize*0.2, 1.5, 0, Math.PI*2);
      bctx.fill();
      bctx.restore();
    });

    // ── 小鳥本体（シマエナガ風・丸くふわふわ）──
    const birdCX = w * 0.35;
    const birdCY = h * 0.47 + Math.sin(t*0.45)*2.5;
    const birdR  = Math.min(w, h) * 0.10;

    // 体の影（枝に落ちる）
    bctx.save();
    bctx.globalAlpha = 0.18;
    bctx.scale(1, 0.3);
    bctx.fillStyle = 'rgba(20,20,40,0.6)';
    bctx.beginPath();
    bctx.ellipse(birdCX + birdR*0.1, (branchY1 + (branchY0-branchY1)*(1-0.35))/0.3 + birdR*0.5/0.3, birdR*0.6, birdR*0.3, 0, 0, Math.PI*2);
    bctx.fill();
    bctx.restore();

    // 尾羽（長く下に）
    bctx.save();
    bctx.strokeStyle = 'rgba(75,78,100,0.85)';
    bctx.lineWidth = birdR*0.12;
    bctx.lineCap = 'round';
    bctx.beginPath();
    bctx.moveTo(birdCX + birdR*0.25, birdCY + birdR*0.45);
    bctx.bezierCurveTo(birdCX + birdR*0.3, birdCY + birdR*2.2, birdCX + birdR*0.2, birdCY + birdR*3.0, birdCX + birdR*0.15, birdCY + birdR*3.8);
    bctx.stroke();
    bctx.restore();

    // 翼のヒント（右側に半開き）
    bctx.save();
    bctx.globalAlpha = 0.72;
    const wingFlap = Math.sin(t*0.3)*0.04;
    bctx.translate(birdCX + birdR*0.5, birdCY + birdR*0.1);
    bctx.rotate(0.18 + wingFlap);
    bctx.fillStyle = 'rgba(195,205,230,0.55)';
    bctx.beginPath();
    bctx.ellipse(0, 0, birdR*0.62, birdR*0.28, -0.3, 0, Math.PI*2);
    bctx.fill();
    // 羽根の筋
    bctx.strokeStyle = 'rgba(215,222,240,0.4)';
    bctx.lineWidth = 0.8;
    for(let wi=0;wi<4;wi++){
      const wa = -0.3 + wi*0.18;
      bctx.beginPath();
      bctx.moveTo(0,0);
      bctx.lineTo(Math.cos(wa)*birdR*0.55, Math.sin(wa)*birdR*0.24);
      bctx.stroke();
    }
    bctx.restore();

    // 体本体（ふわふわした丸い白い体）
    const bodyGrad = bctx.createRadialGradient(
      birdCX - birdR*0.18, birdCY - birdR*0.22, 0,
      birdCX, birdCY, birdR
    );
    bodyGrad.addColorStop(0,   'rgba(255,255,255,0.98)');
    bodyGrad.addColorStop(0.4, 'rgba(240,244,252,0.96)');
    bodyGrad.addColorStop(0.75,'rgba(210,218,240,0.88)');
    bodyGrad.addColorStop(1,   'rgba(175,188,218,0.55)');
    bctx.beginPath();
    bctx.arc(birdCX, birdCY, birdR, 0, Math.PI*2);
    bctx.fillStyle = bodyGrad;
    bctx.fill();

    // 体の産毛テクスチャ（薄い線を散らす）
    bctx.save();
    bctx.globalAlpha = 0.12;
    bctx.strokeStyle = 'rgba(180,190,220,1)';
    bctx.lineWidth = 0.6;
    for(let fi=0;fi<22;fi++){
      const fa = fi/22*Math.PI*2;
      const fr2 = birdR*(0.55+Math.random()*0.35);
      bctx.beginPath();
      bctx.moveTo(birdCX + Math.cos(fa)*fr2*0.5, birdCY + Math.sin(fa)*fr2*0.5);
      bctx.lineTo(birdCX + Math.cos(fa+0.15)*fr2, birdCY + Math.sin(fa+0.08)*fr2);
      bctx.stroke();
    }
    bctx.restore();

    // 黒いアクセント（翼の縁・背中）
    bctx.save();
    bctx.globalAlpha = 0.55;
    bctx.fillStyle = 'rgba(60,62,80,0.7)';
    bctx.beginPath();
    bctx.ellipse(birdCX + birdR*0.08, birdCY + birdR*0.38, birdR*0.45, birdR*0.16, 0.15, 0, Math.PI*2);
    bctx.fill();
    bctx.restore();

    // 顔（頭部・少し小さめ）
    const faceX = birdCX - birdR*0.12;
    const faceY = birdCY - birdR*0.28;
    const faceR = birdR*0.62;
    const faceGrad = bctx.createRadialGradient(faceX-faceR*0.2, faceY-faceR*0.2, 0, faceX, faceY, faceR);
    faceGrad.addColorStop(0,   'rgba(255,255,255,0.98)');
    faceGrad.addColorStop(0.5, 'rgba(242,246,255,0.95)');
    faceGrad.addColorStop(1,   'rgba(200,210,235,0.6)');
    bctx.beginPath();
    bctx.arc(faceX, faceY, faceR, 0, Math.PI*2);
    bctx.fillStyle = faceGrad;
    bctx.fill();

    // 目（黒い丸・光のハイライト）
    const eyeX = faceX + faceR*0.22;
    const eyeY = faceY + faceR*0.08;
    bctx.fillStyle = 'rgba(22,22,30,0.95)';
    bctx.beginPath();
    bctx.arc(eyeX, eyeY, faceR*0.13, 0, Math.PI*2);
    bctx.fill();
    bctx.fillStyle = 'rgba(255,255,255,0.9)';
    bctx.beginPath();
    bctx.arc(eyeX + faceR*0.05, eyeY - faceR*0.05, faceR*0.045, 0, Math.PI*2);
    bctx.fill();

    // くちばし
    bctx.fillStyle = 'rgba(80,75,65,0.88)';
    bctx.beginPath();
    bctx.moveTo(eyeX + faceR*0.15, eyeY + faceR*0.06);
    bctx.lineTo(eyeX + faceR*0.38, eyeY + faceR*0.12);
    bctx.lineTo(eyeX + faceR*0.15, eyeY + faceR*0.18);
    bctx.closePath();
    bctx.fill();

    // 足（枝を掴む）
    const footY = birdCY + birdR * 0.88;
    const footX = birdCX;
    bctx.strokeStyle = 'rgba(90,85,70,0.75)';
    bctx.lineWidth = birdR*0.045;
    bctx.lineCap = 'round';
    [-0.12,0.0,0.12].forEach(dx=>{
      bctx.beginPath();
      bctx.moveTo(footX + dx*birdR*1.5, footY);
      bctx.lineTo(footX + dx*birdR*1.5 + dx*birdR*0.5, footY + birdR*0.18);
      bctx.stroke();
    });
    // 後ろ指
    bctx.beginPath();
    bctx.moveTo(footX - birdR*0.08, footY);
    bctx.lineTo(footX - birdR*0.26, footY + birdR*0.16);
    bctx.stroke();

    // ── 光のきらめき（星型）──
    const sparklePos = [
      [0.58,0.38],[0.65,0.44],[0.72,0.35],[0.79,0.41],[0.86,0.36],[0.68,0.30]
    ];
    sparklePos.forEach(([sx,sy],i)=>{
      const sPhase = t*1.2 + i*1.1;
      const sBright = 0.5 + 0.5*Math.sin(sPhase);
      const sX = sx*w + Math.sin(t*0.2+i)*w*0.008;
      const sY = sy*h + Math.cos(t*0.25+i)*h*0.012;
      const sR = w*0.005 * sBright;
      bctx.save();
      bctx.globalAlpha = sBright * 0.85;
      bctx.fillStyle = 'rgba(255,248,210,0.95)';
      // 4角の星形
      bctx.translate(sX, sY);
      bctx.rotate(t*0.2+i);
      bctx.beginPath();
      for(let sp=0;sp<8;sp++){
        const sAngle = sp/8*Math.PI*2;
        const sLen = sp%2===0 ? sR : sR*0.4;
        sp===0 ? bctx.moveTo(Math.cos(sAngle)*sLen, Math.sin(sAngle)*sLen)
               : bctx.lineTo(Math.cos(sAngle)*sLen, Math.sin(sAngle)*sLen);
      }
      bctx.closePath();
      bctx.fill();
      bctx.restore();
    });

    // ── 最前景の草むら ──
    bctx.fillStyle = 'rgba(8,10,22,0.94)';
    bctx.beginPath();
    bctx.moveTo(0, h);
    [[0,0.93],[0.05,0.88],[0.10,0.91],[0.15,0.86],[0.20,0.90],[0.28,0.87],
     [0.35,0.91],[0.42,0.87],[0.50,0.92],[0.58,0.88],[0.66,0.91],[0.74,0.87],
     [0.82,0.91],[0.90,0.88],[0.96,0.92],[1.0,0.90]].forEach(([px,py])=>
      bctx.lineTo(px*w, py*h));
    bctx.lineTo(w, h);
    bctx.closePath();
    bctx.fill();
  }

  // 1単語ずつ時間差でメッセージを表示
  function revealWords(lines, intervalMs){
    const container = document.getElementById('word-reveal');
    container.innerHTML = '';
    const words = [];
    lines.forEach((line, li)=>{
      line.split(' ').forEach((word, wi)=>{
        const span = document.createElement('span');
        span.className = 'w';
        span.textContent = word;
        container.appendChild(span);
        words.push(span);
      });
      if(li < lines.length - 1){
        const br = document.createElement('span');
        br.className = 'br';
        container.appendChild(br);
      }
    });
    words.forEach((span, i)=>{
      setTimeout(()=> span.classList.add('on'), i * intervalMs);
    });
  }

  function goBirdScene(){

    // アニメーションループ開始
    if(birdRAF) cancelAnimationFrame(birdRAF);
    let bStart = null;
    function bLoop(ts){
      if(!bStart) bStart = ts;
      drawBirdScene((ts - bStart)/1000);
      birdRAF = requestAnimationFrame(bLoop);
    }

        tapHint.classList.add('show');
        scene = 'berries-wait';
      }, 2500);
    }, 28000);

  function goRelease(){
    scene='release';
    tapHint.classList.remove('show');
    moonEl.classList.add('lit');
    setLine('Letting it all go, gently.', 'A release of love');
    const mr = moonRect();
    const cx = mr.left + mr.width/2;
    const cy = mr.top + mr.height/2;

    // 既存のベリーを解放パーティクルへ変換
    const berryPositions = particles.filter(p=>p.type==='berry').map(p=>({x:p.x,y:p.y}));
    particles = particles.filter(p=>p.type!=='berry');
    berryPositions.forEach(p=> spawnRelease(p.x, p.y, true));

    let bursts = 0;
    const burstInterval = setInterval(()=>{
      for(let i=0;i<3;i++){

          cx + (Math.random()-0.5)*mr.width*0.6,
          cy + (Math.random()-0.5)*mr.height*0.6,

        );

      bursts++;
      if(bursts>18) clearInterval(burstInterval);
    }, 160);

    setTimeout(()=>{

      goClosing();
    }, 5200);
  }

  // ---------- 満月判定（既知の新月を基準に朔望月で計算）----------
  function isFullMoonNight(date){
    date = date || new Date();
    const synodicMonth = 29.530588853;
    const knownNewMoon = Date.UTC(2000,0,6,18,14,0); // 2000-01-06 18:14 UTC
    const diffDays = (date.getTime() - knownNewMoon) / 86400000;
    const phase = ((diffDays % synodicMonth) + synodicMonth) % synodicMonth; // 0=新月, 半分=満月
    const distFromFull = Math.abs(phase - synodicMonth/2);
    return distFromFull < 1.0; // 満月の前後1日以内
  }

  // ---------- ハイランド情景 canvas ----------
  const highlandCanvas = document.getElementById('highland-canvas');
  const hctx = highlandCanvas.getContext('2d');
  let highlandRAF = null;

  function resizeHighland(){
    const dpr = Math.min(window.devicePixelRatio||1, 2);
    highlandCanvas.width  = window.innerWidth  * dpr;
    highlandCanvas.height = window.innerHeight * dpr;
    highlandCanvas.style.width  = window.innerWidth  + 'px';
    highlandCanvas.style.height = window.innerHeight + 'px';
    hctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  }
  window.addEventListener('resize', resizeHighland);
  resizeHighland();

  function drawHighlandScene(t){
    const w = window.innerWidth;
    const h = window.innerHeight;
    hctx.clearRect(0, 0, w, h);

    // ── 夜空グラデーション（上：深い紺 / 下：紫がかった濃紺）──
    const sky = hctx.createLinearGradient(0, 0, 0, h);
    sky.addColorStop(0,   'rgba(8,12,28,0.98)');
    sky.addColorStop(0.45,'rgba(15,20,48,0.97)');
    sky.addColorStop(0.72,'rgba(22,28,58,0.93)');
    sky.addColorStop(1,   'rgba(10,14,30,0.97)');
    hctx.fillStyle = sky;
    hctx.fillRect(0, 0, w, h);

    // ── 満月の光が地平線に落ちる moonbeam ──
    const moonX = w * 0.5;
    const moonY = h * 0.22;
    const beam = hctx.createRadialGradient(moonX, moonY, 0, moonX, moonY + h*0.35, h*0.7);
    beam.addColorStop(0,   'rgba(240,235,200,0.10)');
    beam.addColorStop(0.4, 'rgba(200,210,230,0.05)');
    beam.addColorStop(1,   'rgba(100,120,180,0)');
    hctx.fillStyle = beam;
    hctx.fillRect(0, 0, w, h);

    // ── 霧（遠景：うっすらかかる白い靄）──
    const fogY = h * 0.55;
    const fog1 = hctx.createLinearGradient(0, fogY - h*0.08, 0, fogY + h*0.06);
    fog1.addColorStop(0,   'rgba(195,205,225,0)');
    fog1.addColorStop(0.4, 'rgba(195,205,225,0.13)');
    fog1.addColorStop(1,   'rgba(195,205,225,0)');
    hctx.fillStyle = fog1;
    hctx.fillRect(0, fogY - h*0.08, w, h*0.14);

    // ── ハイランドの丘々（3層・奥から手前）──
    function drawHill(pts, color){
      hctx.beginPath();
      hctx.moveTo(0, h);
      pts.forEach((p, i)=>{
        if(i===0) hctx.lineTo(p[0]*w, p[1]*h);
        else {
          const prev = pts[i-1];
          const cpx = (prev[0]*w + p[0]*w)/2;
          hctx.bezierCurveTo(cpx, prev[1]*h, cpx, p[1]*h, p[0]*w, p[1]*h);
        }
      });
      hctx.lineTo(w, h);
      hctx.closePath();
      hctx.fillStyle = color;
      hctx.fill();
    }

    // 最遠景の丘（薄い青紫・ハイランドの山稜）
    drawHill([
      [0,0.62],[0.08,0.54],[0.18,0.48],[0.28,0.52],[0.38,0.45],
      [0.50,0.50],[0.62,0.44],[0.74,0.49],[0.85,0.46],[1.0,0.55]
    ], 'rgba(55,62,105,0.72)');

    // 中景の丘（やや緑がかった濃紺）
    drawHill([
      [0,0.72],[0.06,0.66],[0.15,0.60],[0.26,0.65],[0.36,0.58],
      [0.48,0.63],[0.60,0.57],[0.72,0.62],[0.84,0.58],[1.0,0.68]
    ], 'rgba(38,48,78,0.85)');

    // 前景の丘（最も暗い・緑みがかった黒）
    drawHill([
      [0,0.82],[0.05,0.77],[0.14,0.73],[0.25,0.76],[0.35,0.71],
      [0.46,0.75],[0.58,0.70],[0.70,0.74],[0.82,0.71],[0.92,0.75],[1.0,0.80]
    ], 'rgba(22,30,48,0.95)');

    // ── ヒース（heather）：前景丘の上に小さな紫の点群 ──
    const hillTopY = h * 0.70;
    // 揺らぎ用 seed（毎フレーム固定でOK）
    const heatherSeeds = [
      [0.08,0.75],[0.14,0.72],[0.20,0.74],[0.28,0.71],[0.35,0.73],
      [0.42,0.70],[0.50,0.72],[0.57,0.71],[0.64,0.73],[0.71,0.71],
      [0.78,0.72],[0.85,0.73],[0.92,0.74],[0.04,0.78],[0.32,0.76],
      [0.60,0.75],[0.88,0.77],[0.22,0.77],[0.48,0.76],[0.75,0.75]
    ];
    heatherSeeds.forEach((s, idx)=>{
      const hx = s[0]*w;
      const hy = s[1]*h + Math.sin(t*0.7 + idx)*1.2;
      const swing = Math.sin(t*0.9 + idx*1.3) * 1.5;
      // 茎
      hctx.save();
      hctx.strokeStyle = 'rgba(90,110,70,0.55)';
      hctx.lineWidth = 1.2;
      hctx.beginPath();
      hctx.moveTo(hx, hy + 10);
      hctx.lineTo(hx + swing, hy);
      hctx.stroke();
      // 花（小さい紫点）
      const hGrad = hctx.createRadialGradient(hx+swing, hy-2, 0, hx+swing, hy-2, 5);
      hGrad.addColorStop(0, 'rgba(195,140,205,0.88)');
      hGrad.addColorStop(1, 'rgba(145, 85,175,0)');
      hctx.fillStyle = hGrad;
      hctx.beginPath();
      hctx.arc(hx+swing, hy-2, 5, 0, Math.PI*2);
      hctx.fill();
      hctx.restore();
    });

    // ── ススキ（日本側・右寄りに群生）──
    const susukiRoots = [];
    for(let i=0;i<32;i++){
      // 右寄りに密集、左に少し
      const xRatio = i < 22 ? 0.55 + (i/22)*0.45 : (i-22)/10*0.3;
      susukiRoots.push({ x: xRatio, baseY: 0.92 + Math.sin(i*2.3)*0.04 });
    }
    susukiRoots.forEach((s, idx)=>{
      const sx = s.x * w;
      const sy = s.baseY * h;
      const stemH = h * (0.14 + Math.sin(idx*1.7)*0.04);
      const sw = Math.sin(t * 0.6 + idx * 0.8) * (stemH * 0.06);
      const sw2 = Math.sin(t * 0.55 + idx * 0.9 + 1) * (stemH * 0.04);

      // 茎
      hctx.save();
      hctx.strokeStyle = `rgba(175,168,130,${0.5 + Math.sin(idx)*0.15})`;
      hctx.lineWidth = 1.0;
      hctx.lineCap = 'round';
      hctx.beginPath();
      hctx.moveTo(sx, sy);
      hctx.bezierCurveTo(sx + sw*0.4, sy - stemH*0.5, sx + sw, sy - stemH*0.85, sx + sw + sw2, sy - stemH);
      hctx.stroke();

      // 穂（楕円でふっくら）
      const tipX = sx + sw + sw2;
      const tipY = sy - stemH;
      const spGrad = hctx.createRadialGradient(tipX, tipY+4, 0, tipX, tipY, 9);
      spGrad.addColorStop(0,   `rgba(225,218,185,${0.65 + Math.sin(idx)*0.1})`);
      spGrad.addColorStop(0.5, `rgba(195,185,148,0.45)`);
      spGrad.addColorStop(1,   'rgba(160,150,115,0)');
      hctx.fillStyle = spGrad;
      hctx.beginPath();
      hctx.ellipse(tipX, tipY + 3, 4.5, 10, Math.sin(t*0.5+idx)*0.15, 0, Math.PI*2);
      hctx.fill();
      hctx.restore();
    });

    // ── 霧（手前・地面に漂う）──
    const groundFogY = h * 0.78;
    for(let fi=0;fi<3;fi++){
      const fy2 = groundFogY + fi * h*0.055;
      const fopac = [0.12, 0.09, 0.06][fi];
      const ffog = hctx.createLinearGradient(0, fy2 - h*0.04, 0, fy2 + h*0.05);
      ffog.addColorStop(0,   `rgba(185,195,220,0)`);
      ffog.addColorStop(0.45,`rgba(185,195,220,${fopac + Math.sin(t*0.3+fi)*0.015})`);
      ffog.addColorStop(1,   `rgba(185,195,220,0)`);
      hctx.fillStyle = ffog;
      hctx.fillRect(0, fy2 - h*0.04, w, h*0.09);
    }

    // ── 石積みの塀（ドライストーン・ウォール）──
    const wallY = h * 0.84;
    const wallH = h * 0.028;
    hctx.save();
    hctx.fillStyle = 'rgba(52,58,72,0.82)';
    hctx.beginPath();
    hctx.rect(0, wallY, w * 0.48, wallH);
    hctx.fill();
    // 石の目地（横線）
    hctx.strokeStyle = 'rgba(30,36,52,0.6)';
    hctx.lineWidth = 0.8;
    for(let r=0;r<3;r++){
      hctx.beginPath();
      hctx.moveTo(0, wallY + r*(wallH/3));
      hctx.lineTo(w*0.48, wallY + r*(wallH/3));
      hctx.stroke();
    }
    // 縦目地（ランダム）
    [0.06,0.13,0.19,0.26,0.31,0.38,0.44].forEach(xr=>{
      const jy = wallY + (Math.floor(xr*100)%2)*(wallH/3);
      hctx.beginPath();
      hctx.moveTo(xr*w, jy);
      hctx.lineTo(xr*w, jy + wallH/3);
      hctx.stroke();
    });
    hctx.restore();

    // ── 月明かりの水面反射（池）──
    const pondX = w*0.3;
    const pondY = h*0.87;
    const refGrad = hctx.createRadialGradient(pondX, pondY, 0, pondX, pondY, w*0.08);
    refGrad.addColorStop(0,   `rgba(220,228,200,${0.18 + Math.sin(t*1.2)*0.03})`);
    refGrad.addColorStop(0.5, 'rgba(180,195,220,0.07)');
    refGrad.addColorStop(1,   'rgba(140,165,200,0)');
    hctx.save();
    hctx.scale(1, 0.32);
    hctx.fillStyle = refGrad;
    hctx.beginPath();
    hctx.ellipse(pondX, pondY/0.32, w*0.08, w*0.08, 0, 0, Math.PI*2);
    hctx.fill();
    hctx.restore();

    // ── シルエット（踊る人影・左寄り2人）──
    function drawFigure(fx2, fy2, scale, phase){
      hctx.save();
      hctx.translate(fx2, fy2);
      hctx.scale(scale, scale);
      const sway2 = Math.sin(t*1.4 + phase) * 4;
      const armSwing = Math.sin(t*1.4 + phase) * 0.35;
      hctx.fillStyle = 'rgba(15,18,32,0.88)';
      hctx.strokeStyle = 'rgba(15,18,32,0.88)';
      hctx.lineWidth = 2.8;
      hctx.lineCap = 'round';
      // 頭
      hctx.beginPath();
      hctx.arc(sway2*0.3, -48, 7, 0, Math.PI*2);
      hctx.fill();
      // 胴体
      hctx.beginPath();
      hctx.moveTo(sway2*0.3, -41);
      hctx.lineTo(sway2*0.1, -18);
      hctx.stroke();
      // 左腕
      hctx.beginPath();
      hctx.moveTo(sway2*0.2, -36);
      hctx.lineTo(sway2*0.2 - 14*Math.cos(armSwing), -36 + 14*Math.sin(armSwing) - 8);
      hctx.stroke();
      // 右腕（持ち上げ）
      hctx.beginPath();
      hctx.moveTo(sway2*0.2, -36);
      hctx.lineTo(sway2*0.2 + 16*Math.cos(armSwing+0.5), -36 - 14*Math.sin(armSwing+0.5));
      hctx.stroke();
      // 脚
      const legSwing = Math.sin(t*1.4 + phase) * 0.3;
      hctx.beginPath();
      hctx.moveTo(sway2*0.1, -18);
      hctx.lineTo(sway2*0.1 - 8*Math.sin(legSwing), 0);
      hctx.stroke();
      hctx.beginPath();
      hctx.moveTo(sway2*0.1, -18);
      hctx.lineTo(sway2*0.1 + 10*Math.sin(legSwing+0.4), 0);
      hctx.stroke();
      hctx.restore();
    }

    drawFigure(w*0.15, h*0.83, h/700, 0);
    drawFigure(w*0.20, h*0.83, h/700, Math.PI*0.7);

    // ── 画面上部：夜空に浮かぶ雲の切れ間 ──
    const cloudAlpha = 0.06 + Math.sin(t*0.18)*0.02;
    for(let ci=0;ci<4;ci++){
      const cx2 = w*(0.1 + ci*0.25 + Math.sin(t*0.05+ci)*0.03);
      const cy2 = h*(0.12 + Math.sin(ci*1.3)*0.06);
      const cloudGrad = hctx.createRadialGradient(cx2, cy2, 0, cx2, cy2, w*0.12);
      cloudGrad.addColorStop(0,   `rgba(180,190,215,${cloudAlpha})`);
      cloudGrad.addColorStop(1,   'rgba(140,155,195,0)');
      hctx.fillStyle = cloudGrad;
      hctx.beginPath();
      hctx.ellipse(cx2, cy2, w*0.12, h*0.04, 0, 0, Math.PI*2);
      hctx.fill();
    }

    // ── 最前景の暗いシルエット草むら ──
    hctx.fillStyle = 'rgba(8,10,20,0.92)';
    hctx.beginPath();
    hctx.moveTo(0, h);
    const grassPts = [
      [0,0.95],[0.03,0.90],[0.06,0.94],[0.09,0.88],[0.12,0.93],
      [0.16,0.87],[0.20,0.92],[0.25,0.88],[0.30,0.93],[0.36,0.87],
      [0.42,0.91],[0.48,0.88],[0.54,0.93],[0.60,0.87],[0.66,0.92],
      [0.72,0.88],[0.78,0.93],[0.84,0.88],[0.90,0.93],[0.95,0.89],[1.0,0.94]
    ];
    grassPts.forEach(p=> hctx.lineTo(p[0]*w, p[1]*h));
    hctx.lineTo(w, h);
    hctx.closePath();
    hctx.fill();
  }

  function offerHiddenScene(){
    scene='hidden-offer';
    setLine('A somewhat special night.', 'Would you like to gently touch it?');
    tapHint.classList.add('show');
  }

  function revealHiddenScene(){
    scene='hidden';
    tapHint.classList.remove('show');
    setLine('', '');
    hiddenScene.classList.add('show');
    // ハイランドシーンのアニメーションループ開始
    if(highlandRAF) cancelAnimationFrame(highlandRAF);
    let hStart = null;
    function hLoop(ts){
      if(!hStart) hStart = ts;
      drawHighlandScene((ts - hStart)/1000);
      highlandRAF = requestAnimationFrame(hLoop);
    }
    highlandRAF = requestAnimationFrame(hLoop);
  }

  soundToggle.addEventListener('click', (e)=>{
    e.stopPropagation();
    if(!audioPlaying){
      furusatoAudio.play().then(()=>{
        audioPlaying = true;
        soundToggle.textContent = 'Stop, softly';
      }).catch(()=>{
        // if public/audio/furusato-no-sora.mp3 doesn't exist yet, fail silently
        soundToggle.textContent = '(there is no sound yet)';
      });
    } else {
      furusatoAudio.pause();
      furusatoAudio.currentTime = 0;
      audioPlaying = false;
      soundToggle.textContent = 'Listen, softly';
    }
  });

  // ---------- 入力イベント ----------
  document.getElementById('btn-write').addEventListener('click', (e)=>{
    e.stopPropagation();
    goWriting();
  });
  document.getElementById('btn-close').addEventListener('click', (e)=>{
    e.stopPropagation();
    finishWithWord('');
  });
  submitWord.addEventListener('click', (e)=>{
    e.stopPropagation();
    finishWithWord(wordInput.value);
  });
  wordInput.addEventListener('keydown', (e)=>{
    if(e.key === 'Enter'){ finishWithWord(wordInput.value); }
  });
  wordInput.addEventListener('click', (e)=> e.stopPropagation());

  stage.addEventListener('click', (e)=>{
    if(e.target.closest('#choice-row') || e.target.closest('#input-row') || e.target.closest('#hidden-scene')) return;
    if(scene==='intro') goPrompt();
    else if(scene==='berries-wait') goRelease();
    else if(scene==='hidden-offer') revealHiddenScene();
    else if(scene==='end') goIntro();
  });

  // ハイランドシーン画面：タップで最初に戻る
  hiddenScene.addEventListener('click', (e)=>{
    if(e.target.closest('#sound-toggle')) return; // 音楽ボタンは除外
    if(scene==='hidden') goIntro();
  });

  // 起動
  setTimeout(goIntro, 400);
})();
</script>
</body>
</html>
