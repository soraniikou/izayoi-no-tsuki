<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Release to the Moon</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Shippori+Mincho:wght@400;500;600&family=Zen+Kaku+Gothic+New:wght@300;400&display=swap" rel="stylesheet">
<style>
  :root{
    --night-top: #0a0e1c;
    --night-bottom: #131c33;
    --moon-core: #fff8ea;
    --moon-edge: #e9dcc0;
    --berry: #b23a52;
    --berry-soft: rgba(178,58,82,0.55);
    --ink: #d9dce8;
    --whisper: #7c8299;
  }
  *{ box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body{
    margin:0; padding:0; width:100%; height:100%;
    background: radial-gradient(ellipse at 50% 20%, var(--night-bottom) 0%, var(--night-top) 70%);
    overflow:hidden;
    font-family: 'Zen Kaku Gothic New', sans-serif;
    color: var(--ink);
    user-select:none;
  }
  #stage{
    position:relative; width:100vw; height:100vh;
    display:flex; align-items:center; justify-content:center;
  }
  canvas#stars{ position:absolute; inset:0; width:100%; height:100%; }
  canvas#particles{ position:absolute; inset:0; width:100%; height:100%; pointer-events:none; }

  #moon-wrap{
    position:absolute;
    top:42%; left:50%;
    transform: translate(-50%,-50%);
    width: 34vmin; height:34vmin;
    z-index:2;
  }
  #moon-glow{
    position:absolute; inset:-40%;
    border-radius:50%;
    background: radial-gradient(circle, rgba(255,248,234,0.35) 0%, rgba(255,248,234,0.08) 45%, rgba(255,248,234,0) 70%);
    animation: breathe 6s ease-in-out infinite;
  }
  #moon{
    position:absolute; inset:0;
    border-radius:50%;
    background: radial-gradient(circle at 38% 35%, var(--moon-core) 0%, var(--moon-edge) 60%, #cbb98e 100%);
    box-shadow: 0 0 60px rgba(255,248,234,0.25);
    animation: breathe 6s ease-in-out infinite;
  }
  @keyframes breathe{
    0%,100%{ filter:brightness(1); }
    50%{ filter:brightness(1.08); }
  }
  #moon.lit{
    box-shadow: 0 0 110px rgba(255,248,234,0.55), 0 0 200px rgba(178,58,82,0.15);
  }

  #text-layer{
    position:absolute;
    top:0; left:0; width:100%; height:100%;
    display:flex; flex-direction:column; align-items:center; justify-content:flex-end;
    padding: 0 8vw 4vh 8vw;
    z-index:5;
    pointer-events:none;
  }
  .line{
    font-family:'Shippori Mincho', serif;
    font-size: clamp(17px, 2.6vmin, 24px);
    line-height:1.9;
    text-align:center;
    letter-spacing: 0.04em;
    color: var(--ink);
    opacity:0;
    transition: opacity 2.2s ease;
    max-width: 620px;
    text-shadow: 0 2px 12px rgba(10,14,28,0.9);
  }
  .line.show{ opacity:1; }
  .micro{
    font-family:'Zen Kaku Gothic New', sans-serif;
    font-weight:300;
    font-size: clamp(11px, 1.6vmin, 13px);
    color: var(--whisper);
    letter-spacing:0.08em;
    margin-top:14px;
    text-shadow: 0 2px 12px rgba(10,14,28,0.9);
    opacity:0;
    transition: opacity 1.8s ease;
  }
  .micro.show{ opacity:1; }

  #choice-row{
    display:flex; gap:16px; margin-top:26px;
    opacity:0; transform:translateY(6px);
    transition: opacity 1.4s ease, transform 1.4s ease;
    pointer-events:none;
  }
  #choice-row.show{ opacity:1; transform:translateY(0); pointer-events:auto; }
  .choice-btn{
    font-family:'Zen Kaku Gothic New', sans-serif;
    font-weight:300;
    font-size: clamp(12px, 1.7vmin, 14px);
    letter-spacing:0.06em;
    background: transparent;
    color: var(--ink);
    border: 1px solid rgba(217,220,232,0.35);
    border-radius: 999px;
    padding: 11px 26px;
    cursor:pointer;
    transition: border-color 0.6s ease, background 0.6s ease;
  }
  .choice-btn:hover{ border-color: rgba(217,220,232,0.75); background: rgba(217,220,232,0.06); }
  .choice-btn.berry{ border-color: var(--berry-soft); }
  .choice-btn.berry:hover{ background: rgba(178,58,82,0.1); border-color: var(--berry); }

  #input-row{
    display:flex; flex-direction:column; align-items:center; gap:14px;
    margin-top:24px;
    opacity:0; max-height:0; overflow:hidden;
    transition: opacity 1s ease;
    pointer-events:none;
    width:100%;
  }
  #input-row.show{ opacity:1; max-height:200px; pointer-events:auto; }
  #word-input{
    font-family:'Shippori Mincho', serif;
    font-size: clamp(15px, 2vmin, 18px);
    background: transparent;
    border:none;
    border-bottom: 1px solid rgba(217,220,232,0.4);
    color: var(--ink);
    text-align:center;
    padding: 8px 4px;
    width: min(85vw, 420px);
    outline:none;
    letter-spacing:0.04em;
  }
  #word-input::placeholder{ color: rgba(217,220,232,0.3); }
  #submit-word{
    font-family:'Zen Kaku Gothic New', sans-serif;
    font-weight:300;
    font-size: clamp(11px, 1.5vmin, 13px);
    letter-spacing:0.08em;
    background: none; border:none; color: var(--whisper);
    cursor:pointer; padding:4px 10px;
    transition: color 0.5s ease;
  }
  #submit-word:hover{ color: var(--ink); }

  #tap-hint{
    position:absolute; bottom:5vh; left:50%; transform:translateX(-50%);
    font-family:'Zen Kaku Gothic New', sans-serif;
    font-weight:300;
    font-size: 11px;
    letter-spacing:0.1em;
    color: rgba(200,205,225,0.9);
    opacity:0;
    transition: opacity 2s ease;
    z-index:6;
    animation: pulse 3.5s ease-in-out infinite;
  }
  #tap-hint.show{ opacity:1; }
  @keyframes pulse{
    0%,100%{ opacity:0.7; } 50%{ opacity:1; }
  }

  #privacy{
    position:absolute; top:3vh; left:50%; transform:translateX(-50%);
    font-size:10px; letter-spacing:0.05em; color: rgba(124,130,153,0.4);
    text-align:center; max-width:80vw; z-index:6;
    font-family:'Zen Kaku Gothic New', sans-serif; font-weight:300;
  }

  #floating-word{
    position:absolute; top:50%; left:50%; transform:translate(-50%,-50%);
    font-family:'Shippori Mincho', serif;
    font-size: clamp(16px, 2.4vmin, 20px);
    color: rgba(217,220,232,0.9);
    opacity:0; z-index:4; letter-spacing:0.05em;
    pointer-events:none; white-space:nowrap;
  }

  /* ---------- 満月の夜だけの隠し演出 ---------- */
  #hidden-scene{
    position:absolute; inset:0; z-index:8;
    opacity:0; pointer-events:none;
    transition: opacity 4s ease;
  }
  #hidden-scene.show{ opacity:1; pointer-events:auto; }

  #highland-canvas{
    position:absolute; inset:0; width:100%; height:100%;
    pointer-events:none;
  }

  #hidden-text{
    position:absolute; top:10%; left:50%; transform:translateX(-50%);
    text-align:center; width:82%; max-width:540px;
    font-family:'Shippori Mincho', serif;
    font-size: clamp(13px, 1.9vmin, 16px);
    line-height:2.1;
    color: rgba(210,218,235,0.88);
    text-shadow: 0 2px 16px rgba(5,10,25,0.95);
    letter-spacing: 0.03em;
  }
  #sound-toggle{
    position:absolute; bottom:6vh; left:50%; transform:translateX(-50%);
    font-family:'Zen Kaku Gothic New', sans-serif;
    font-weight:300; font-size:12px; letter-spacing:0.08em;
    background:none; border:1px solid rgba(217,220,232,0.35);
    color:var(--ink); border-radius:999px; padding:9px 22px;
    cursor:pointer; z-index:2;
  }
  #sound-toggle:hover{ border-color: rgba(217,220,232,0.7); }

  /* ---------- 月→クローバー変化オーバーレイ ---------- */
  #clover-canvas{
    position:absolute; inset:0; width:100%; height:100%;
    pointer-events:none; z-index:3;
  }
</style>
</head>
<body>
<div id="stage">
  <canvas id="stars"></canvas>
  <div id="moon-wrap">
    <div id="moon-glow"></div>
    <div id="moon"></div>
  </div>
  <canvas id="particles"></canvas>
  <canvas id="clover-canvas"></canvas>
  <div id="floating-word"></div>

  <div id="privacy">This stays only within you. Nothing you write is ever sent or saved.</div>

  <div id="text-layer">
    <p class="line" id="line-main"></p>
    <p class="micro" id="line-micro"></p>
    <div id="choice-row">
      <button class="choice-btn berry" id="btn-write">Write</button>
      <button class="choice-btn" id="btn-close">Gently close</button>
    </div>
    <div id="input-row">
      <input type="text" id="word-input" placeholder="" maxlength="40">
      <button id="submit-word"></button>
    </div>
  </div>
  <div id="tap-hint">Touch the screen to continue</div>

  <div id="hidden-scene">
    <canvas id="highland-canvas"></canvas>
    <div id="hidden-text">
      Under the same full moon —<br>
      on Highland hills where the heather sways,<br>
      and in fields of pampas grass where the wind breathes —<br>
      people danced. They were looking up at the same moon.
    </div>
    <button id="sound-toggle">Listen, softly</button>
  </div>
  <audio id="furusato-audio" src="audio/furusato-no-sora.mp3" preload="none" loop></audio>
</div>

<script>
(function(){
  "use strict";

  // ---------- 星の背景 ----------
  const starsCanvas = document.getElementById('stars');
  const sctx = starsCanvas.getContext('2d');
  const particlesCanvas = document.getElementById('particles');
  const pctx = particlesCanvas.getContext('2d');
  const cloverCanvas = document.getElementById('clover-canvas');
  const cctx = cloverCanvas.getContext('2d');
  let W, H, DPR;

  function resize(){
    DPR = Math.min(window.devicePixelRatio || 1, 2);
    W = window.innerWidth; H = window.innerHeight;
    [starsCanvas, particlesCanvas, cloverCanvas].forEach(c=>{
      c.width = W*DPR; c.height = H*DPR;
      c.style.width = W+"px"; c.style.height = H+"px";
    });
    sctx.setTransform(DPR,0,0,DPR,0,0);
    pctx.setTransform(DPR,0,0,DPR,0,0);
    cctx.setTransform(DPR,0,0,DPR,0,0);
  }
  window.addEventListener('resize', resize);
  resize();

  const stars = [];
  const STAR_COUNT = 140;
  for(let i=0;i<STAR_COUNT;i++){
    stars.push({
      x: Math.random()*W,
      y: Math.random()*H*0.85,
      r: Math.random()*1.3 + 0.2,
      baseA: Math.random()*0.6+0.15,
      tw: Math.random()*Math.PI*2,
      speed: Math.random()*0.02+0.005
    });
  }

  function drawStars(t){
    sctx.clearRect(0,0,W,H);
    stars.forEach(s=>{
      const a = s.baseA + Math.sin(t*s.speed + s.tw)*0.2;
      sctx.beginPath();
      sctx.arc(s.x, s.y, s.r, 0, Math.PI*2);
      sctx.fillStyle = `rgba(230,235,250,${Math.max(0,a)})`;
      sctx.fill();
    });
  }

  // ---------- 粒子（ラズベリーの光 / 解放の光）----------
  let particles = [];
  function spawnBerry(x,y){
    particles.push({
      type:'berry',
      x, y, targetY:y,
      r: 0,
      maxR: Math.random()*2.5+2.5,
      a:0,
      life:0,
      phase:'grow'
    });
  }
  function spawnRelease(x,y,isBerry){
    particles.push({
      type: isBerry ? 'berry-release' : 'light',
      x, y,
      vx: (Math.random()-0.5)*0.3,
      vy: -(Math.random()*0.6+0.35),
      r: isBerry ? (Math.random()*2+2) : (Math.random()*1.5+0.6),
      a: 1,
      life:0
    });
  }

  function updateParticles(){
    pctx.clearRect(0,0,W,H);
    particles = particles.filter(p=>{
      p.life += 1;
      if(p.type==='berry'){
        if(p.phase==='grow'){
          p.r += (p.maxR - p.r)*0.08;
          p.a = Math.min(1, p.a+0.03);
          if(p.r > p.maxR-0.1) p.phase='hold';
        }
        pctx.beginPath();
        pctx.arc(p.x, p.y, p.r, 0, Math.PI*2);
        pctx.fillStyle = `rgba(178,58,82,${0.75*p.a})`;
        pctx.shadowColor = 'rgba(178,58,82,0.6)';
        pctx.shadowBlur = 8;
        pctx.fill();
        pctx.shadowBlur = 0;
        return true;
      } else {
        p.x += p.vx; p.y += p.vy;
        p.a -= 0.006;
        const color = p.type==='berry-release' ? '178,58,82' : '245,241,230';
        pctx.beginPath();
        pctx.arc(p.x, p.y, p.r, 0, Math.PI*2);
        pctx.fillStyle = `rgba(${color},${Math.max(0,p.a)})`;
        pctx.shadowColor = `rgba(${color},0.7)`;
        pctx.shadowBlur = 6;
        pctx.fill();
        pctx.shadowBlur = 0;
        return p.a > 0 && p.y > -20;
      }
    });
  }

  let t0 = 0;
  function loop(t){
    t0 = t/1000;
    drawStars(t0);
    updateParticles();
    requestAnimationFrame(loop);
  }
  requestAnimationFrame(loop);

  // ---------- シーン制御 ----------
  const lineMain = document.getElementById('line-main');
  const lineMicro = document.getElementById('line-micro');
  const choiceRow = document.getElementById('choice-row');
  const inputRow = document.getElementById('input-row');
  const wordInput = document.getElementById('word-input');
  const submitWord = document.getElementById('submit-word');
  const tapHint = document.getElementById('tap-hint');
  const moonEl = document.getElementById('moon');
  const floatingWord = document.getElementById('floating-word');
  const stage = document.getElementById('stage');

  let scene = 'intro';
  let userWord = '';
  const moonRect = ()=>document.getElementById('moon-wrap').getBoundingClientRect();

  function setLine(text, micro){
    lineMain.classList.remove('show');
    lineMicro.classList.remove('show');
    setTimeout(()=>{
      lineMain.innerHTML = text || '';
      lineMicro.innerHTML = micro || '';
      requestAnimationFrame(()=>{
        lineMain.classList.add('show');
        if(micro) lineMicro.classList.add('show');
      });
    }, text ? 300 : 0);
  }

  function hideChoices(){
    choiceRow.classList.remove('show');
    inputRow.classList.remove('show');
  }

  function goIntro(){
    scene='intro';
    hideChoices();
    tapHint.classList.remove('show');
    hiddenScene.classList.remove('show');
    if(highlandRAF){ cancelAnimationFrame(highlandRAF); highlandRAF=null; hctx.clearRect(0,0,window.innerWidth,window.innerHeight); }
    if(audioPlaying){ furusatoAudio.pause(); furusatoAudio.currentTime=0; audioPlaying=false; soundToggle.textContent='Listen, softly'; }
    setLine('', '');
    setTimeout(()=>{
      setLine('Buck Moon.', '');
      setTimeout(()=> tapHint.classList.add('show'), 2600);
    }, 600);
  }

  function goPrompt(){
    scene='prompt';
    tapHint.classList.remove('show');
    setLine('Is there something you\u2019d like to let go of?', '');
    setTimeout(()=>{
      choiceRow.classList.add('show');
    }, 1800);
  }

  function goWriting(){
    scene='writing';
    hideChoices();
    setLine('<span style="color:#6aa3d5;">Would you like to put it into words?</span>', '');
    setTimeout(()=>{
      inputRow.classList.add('show');
      wordInput.focus();
    }, 1200);
  }

  function finishWithWord(word){
    userWord = word.trim();
    hideChoices();
    if(userWord){
      setLine('', '');
      // 浮かぶ文字 → 月へ吸い込まれる
      floatingWord.textContent = userWord;
      floatingWord.style.transition = 'none';
      floatingWord.style.opacity = '0';
      floatingWord.style.transform = 'translate(-50%,-50%) scale(1)';
      requestAnimationFrame(()=>{
        floatingWord.style.transition = 'opacity 1.2s ease';
        floatingWord.style.opacity = '0.9';
      });
      setTimeout(()=>{
        const mr = moonRect();
        floatingWord.style.transition = 'all 2.4s cubic-bezier(0.4,0,0.2,1)';
        floatingWord.style.transform = 'translate(-50%,-50%) scale(0.3)';
        floatingWord.style.opacity = '0';
        floatingWord.style.top = '50%';
        floatingWord.style.left = '50%';
        moonEl.classList.add('lit');
      }, 1400);
      setTimeout(()=>{ moonEl.classList.remove('lit'); goBerries(); }, 4200);
    } else {
      setLine('Even words unspoken,', 'are enough as they are');
      setTimeout(()=> goBerries(), 3400);
    }
  }

  function goBerries(){
    scene='berries';
    hideChoices();
    setLine('Summer\u2019s fruit glows around the moon.', '');
    const mr = moonRect();
    const cx = mr.left + mr.width/2;
    const cy = mr.top + mr.height/2;
    const radius = mr.width*0.85;
    let count = 0;
    const totalBerries = 7;
    const interval = setInterval(()=>{
      const angle = Math.random()*Math.PI*2;
      const dist = radius + Math.random()*40;
      spawnBerry(cx + Math.cos(angle)*dist, cy + Math.sin(angle)*dist*0.6);
      count++;
      if(count >= totalBerries){
        clearInterval(interval);
        setTimeout(()=>{
          moonToClover();
        }, 1800);
      }
    }, 550);
  }

  // ---------- 月 → レッドクローバー変化 ----------
  // 先端がやや尖った葉のパス（ベジェ曲線）
  function leafPath(ctx, hw, hl){
    ctx.beginPath();
    ctx.moveTo(0, -hl);                               // 先端（少し尖る）
    ctx.bezierCurveTo( hw*0.9, -hl*0.55,  hw, hl*0.2,  hw*0.35, hl*0.82);  // 右
    ctx.bezierCurveTo( hw*0.15, hl,        0,  hl*0.95,  0, hl);            // 右→底
    ctx.bezierCurveTo(-hw*0.15, hl,       -hw*0.35, hl*0.82, -hw, hl*0.2); // 底→左
    ctx.bezierCurveTo(-hw*0.9, -hl*0.55,  0, -hl,  0, -hl);                // 左→先端
    ctx.closePath();
  }

  // レッドクローバーの葉（尖り気味＋薄い緑＋白いV字）
  function drawTrifoliate(ctx, bx, by, leafR, angle, alpha){
    const leafAngles = [-Math.PI/6, Math.PI/2, Math.PI + Math.PI/6];
    leafAngles.forEach(la => {
      const lx = bx + Math.cos(angle + la) * leafR * 0.9;
      const ly = by + Math.sin(angle + la) * leafR * 0.9;
      ctx.save();
      ctx.translate(lx, ly);
      ctx.rotate(angle + la + Math.PI/2);

      // 葉身（やや尖った形・薄い緑）
      const lGrad = ctx.createRadialGradient(0, -leafR*0.2, 0, 0, leafR*0.1, leafR*0.95);
      lGrad.addColorStop(0,   `rgba(130,185,105,${alpha*0.92})`);
      lGrad.addColorStop(0.5, `rgba(100,160, 80,${alpha*0.88})`);
      lGrad.addColorStop(1,   `rgba( 75,130, 58,${alpha*0.65})`);
      leafPath(ctx, leafR*0.56, leafR*0.9);
      ctx.fillStyle = lGrad;
      ctx.fill();

      // 中央脈
      ctx.strokeStyle = `rgba(155,210,120,${alpha*0.45})`;
      ctx.lineWidth = leafR * 0.06;
      ctx.lineCap = 'round';
      ctx.beginPath();
      ctx.moveTo(0, leafR*0.82);
      ctx.lineTo(0, -leafR*0.82);
      ctx.stroke();

      // 白いV字模様
      ctx.strokeStyle = `rgba(220,235,210,${alpha*0.52})`;
      ctx.lineWidth = leafR * 0.085;
      ctx.lineCap = 'round';
      ctx.lineJoin = 'round';
      ctx.beginPath();
      ctx.moveTo(-leafR*0.28, 0);
      ctx.lineTo(0, -leafR*0.16);
      ctx.lineTo(leafR*0.28, 0);
      ctx.stroke();

      ctx.restore();
    });

    // 葉柄
    ctx.save();
    ctx.strokeStyle = `rgba(100,155,75,${alpha*0.55})`;
    ctx.lineWidth = leafR * 0.085;
    ctx.lineCap = 'round';
    leafAngles.forEach(la => {
      const lx = bx + Math.cos(angle + la) * leafR * 0.9;
      const ly = by + Math.sin(angle + la) * leafR * 0.9;
      ctx.beginPath();
      ctx.moveTo(bx, by);
      ctx.lineTo(lx, ly);
      ctx.stroke();
    });
    ctx.restore();
  }

  // 個々の小花を描く（花びらが外向きに開く）
  function drawFloret(ctx, px, py, size, outAngle, alpha){
    const PETAL = 5;
    for(let p = 0; p < PETAL; p++){
      const pa = outAngle + (p / PETAL) * Math.PI * 2;
      const tipX = px + Math.cos(pa) * size * 1.0;
      const tipY = py + Math.sin(pa) * size * 0.92;
      const midX = px + Math.cos(pa) * size * 0.48;
      const midY = py + Math.sin(pa) * size * 0.44;
      const lx   = px + Math.cos(pa - 0.55) * size * 0.42;
      const ly   = py + Math.sin(pa - 0.55) * size * 0.38;
      const rx   = px + Math.cos(pa + 0.55) * size * 0.42;
      const ry   = py + Math.sin(pa + 0.55) * size * 0.38;

      // 花びらグラデーション（根元が白っぽく、先端が濃い赤紫）
      const pGrad = ctx.createLinearGradient(px, py, tipX, tipY);
      pGrad.addColorStop(0,    `rgba(245,195,215,${alpha*0.9})`);
      pGrad.addColorStop(0.35, `rgba(205,100,148,${alpha*0.95})`);
      pGrad.addColorStop(0.75, `rgba(168, 52,110,${alpha*0.95})`);
      pGrad.addColorStop(1,    `rgba(140, 35, 88,${alpha*0.85})`);

      ctx.beginPath();
      ctx.moveTo(px, py);
      ctx.quadraticCurveTo(lx, ly, tipX, tipY);
      ctx.quadraticCurveTo(rx, ry, px, py);
      ctx.fillStyle = pGrad;
      ctx.fill();

      // 花びら中央の細い筋
      ctx.save();
      ctx.globalAlpha = alpha * 0.3;
      ctx.strokeStyle = `rgba(220,140,175,1)`;
      ctx.lineWidth = size * 0.07;
      ctx.lineCap = 'round';
      ctx.beginPath();
      ctx.moveTo(midX, midY);
      ctx.lineTo(tipX, tipY);
      ctx.stroke();
      ctx.restore();
    }

    // 小花の中心（白→薄黄）
    const cGrad = ctx.createRadialGradient(px, py, 0, px, py, size*0.28);
    cGrad.addColorStop(0,   `rgba(255,252,235,${alpha*0.98})`);
    cGrad.addColorStop(0.6, `rgba(235,215,170,${alpha*0.85})`);
    cGrad.addColorStop(1,   `rgba(200,170,110,${alpha*0.5})`);
    ctx.beginPath();
    ctx.arc(px, py, size * 0.28, 0, Math.PI*2);
    ctx.fillStyle = cGrad;
    ctx.fill();
  }

  // 画像に近いレッドクローバー花頭
  function drawFlowerHead(ctx, fx, fy, fr, alpha){
    // 外側グロー
    const glow = ctx.createRadialGradient(fx, fy - fr*0.1, 0, fx, fy, fr * 1.6);
    glow.addColorStop(0,   `rgba(210,100,145,${alpha*0.32})`);
    glow.addColorStop(0.6, `rgba(180, 60,115,${alpha*0.1})`);
    glow.addColorStop(1,   `rgba(150, 40, 95,0)`);
    ctx.beginPath();
    ctx.arc(fx, fy, fr * 1.6, 0, Math.PI*2);
    ctx.fillStyle = glow;
    ctx.fill();

    // がく（sepal）：尖った緑の三角形を花底に並べる
    const SEPAL = 10;
    for(let s = 0; s < SEPAL; s++){
      const sa = (s / SEPAL) * Math.PI * 2 + 0.15;
      const sx = fx + Math.cos(sa) * fr * 0.5;
      const sy = fy + fr * 0.36 + Math.sin(sa) * fr * 0.22;
      const tipSx = fx + Math.cos(sa) * fr * 0.85;
      const tipSy = sy + fr * 0.38;
      ctx.save();
      ctx.globalAlpha = alpha * 0.88;
      ctx.fillStyle = `rgba(85,138,58,1)`;
      ctx.beginPath();
      ctx.moveTo(sx - fr*0.06, sy);
      ctx.lineTo(tipSx, tipSy);
      ctx.lineTo(sx + fr*0.06, sy);
      ctx.closePath();
      ctx.fill();
      ctx.restore();
    }

    // 花托（緑のドーム底部）
    const recGrad = ctx.createRadialGradient(fx, fy + fr*0.22, 0, fx, fy + fr*0.1, fr*0.58);
    recGrad.addColorStop(0, `rgba(110,158,72,${alpha*0.92})`);
    recGrad.addColorStop(1, `rgba( 72,112,46,${alpha*0.6})`);
    ctx.beginPath();
    ctx.ellipse(fx, fy + fr*0.28, fr*0.52, fr*0.28, 0, 0, Math.PI*2);
    ctx.fillStyle = recGrad;
    ctx.fill();

    // 小花を球面に配置（外周4層）
    const layers = [
      { count: 12, elevFrac: 0.0, rScale: 0.82, yOff: 0.0,  sizeF: 0.21 }, // 外周
      { count: 10, elevFrac: 0.3, rScale: 0.62, yOff: 0.28, sizeF: 0.195 },
      { count:  8, elevFrac: 0.6, rScale: 0.38, yOff: 0.52, sizeF: 0.178 },
      { count:  4, elevFrac: 1.0, rScale: 0.12, yOff: 0.75, sizeF: 0.16  }, // 頂部
    ];

    layers.forEach((layer, li) => {
      for(let i = 0; i < layer.count; i++){
        const az = (i / layer.count) * Math.PI * 2 + li * 0.38;
        const px = fx + Math.cos(az) * fr * layer.rScale;
        const py = fy - fr * layer.yOff + Math.sin(az) * fr * layer.rScale * 0.48;
        const floretSize = fr * layer.sizeF;
        // 外向き角度（球面の法線方向）
        const outAngle = Math.atan2(py - (fy - fr*0.3), px - fx);
        drawFloret(ctx, px, py, floretSize, outAngle, alpha);
      }
    });

    // 全体球形にうっすら色をのせる
    const overlay = ctx.createRadialGradient(fx - fr*0.18, fy - fr*0.28, 0, fx, fy, fr*0.92);
    overlay.addColorStop(0,   `rgba(240,160,195,${alpha*0.18})`);
    overlay.addColorStop(0.7, `rgba(175, 58,115,${alpha*0.1})`);
    overlay.addColorStop(1,   `rgba(145, 40, 95,0)`);
    ctx.beginPath();
    ctx.arc(fx, fy, fr * 0.92, 0, Math.PI*2);
    ctx.fillStyle = overlay;
    ctx.fill();
  }

  function drawCloverShape(ctx, cx, cy, r, alpha){
    ctx.save();

    // --- 茎（太め、やや湾曲）---
    const stemBot = { x: cx + r*0.05, y: cy + r*1.35 };
    const stemTop = { x: cx,          y: cy + r*0.3  };
    ctx.strokeStyle = `rgba(105,158,78,${alpha*0.82})`;
    ctx.lineWidth   = r * 0.11;
    ctx.lineCap = 'round';
    ctx.beginPath();
    ctx.moveTo(stemBot.x, stemBot.y);
    ctx.bezierCurveTo(
      stemBot.x + r*0.1, stemBot.y - r*0.5,
      stemTop.x - r*0.05, stemTop.y + r*0.4,
      stemTop.x, stemTop.y
    );
    ctx.stroke();

    // 茎の産毛（細い短線を散らす）
    ctx.strokeStyle = `rgba(140,190,105,${alpha*0.22})`;
    ctx.lineWidth = r * 0.025;
    for(let i = 0; i < 10; i++){
      const tt = i / 10;
      const hx = cx + (stemBot.x - cx) * (1 - tt);
      const hy = cy + r*0.3 + (stemBot.y - cy - r*0.3) * (1 - tt);
      const side = (i % 2 === 0 ? 1 : -1);
      ctx.beginPath();
      ctx.moveTo(hx, hy);
      ctx.lineTo(hx + side * r*0.08, hy - r*0.04);
      ctx.stroke();
    }

    // --- 下部の三つ葉（茎中段・0.6倍） ---
    drawTrifoliate(ctx, cx - r*0.04, cy + r*0.78, r*0.38*0.6, -Math.PI/10, alpha);

    // --- 上部の三つ葉（花の直下・0.6倍） ---
    drawTrifoliate(ctx, cx, cy + r*0.32, r*0.32*0.6, Math.PI/12, alpha);

    // --- 花頭（1.5倍） ---
    drawFlowerHead(ctx, cx, cy - r*0.22, r*0.55*1.5, alpha);

    ctx.restore();
  }

  function moonToClover(){
    scene = 'moon-transform';
    tapHint.classList.remove('show');

    const mr = moonRect();
    const cx = mr.left + mr.width / 2;
    const cy = mr.top  + mr.height / 2;
    const moonR = mr.width / 2;

    const DURATION = 4200; // ms
    const startTime = performance.now();

    // ベリーパーティクルを消す
    particles = particles.filter(p => p.type !== 'berry');

    function animFrame(now){
      const elapsed = now - startTime;
      const t = Math.min(elapsed / DURATION, 1); // 0→1
      const ease = t < 0.5 ? 2*t*t : -1+(4-2*t)*t; // ease-in-out

      cctx.clearRect(0, 0, W, H);

      // 月をフェードアウト（CSSではなくcanvasで重ねて消す）
      if(t < 0.85){
        const moonFade = 1 - Math.min(t / 0.7, 1);
        cctx.save();
        cctx.globalAlpha = (1 - moonFade);
        // 月の上にベールをかける（背景色で塗りつぶし）
        const veilGrad = cctx.createRadialGradient(cx, cy, 0, cx, cy, moonR * 1.6);
        veilGrad.addColorStop(0,   `rgba(15,20,40,${(1-moonFade)*0.92})`);
        veilGrad.addColorStop(0.7, `rgba(15,20,40,${(1-moonFade)*0.6})`);
        veilGrad.addColorStop(1,   `rgba(15,20,40,0)`);
        cctx.beginPath();
        cctx.arc(cx, cy, moonR * 1.6, 0, Math.PI * 2);
        cctx.fillStyle = veilGrad;
        cctx.fill();
        cctx.restore();
      } else {
        // 月を完全に覆う
        cctx.save();
        const veilGrad = cctx.createRadialGradient(cx, cy, 0, cx, cy, moonR * 1.6);
        veilGrad.addColorStop(0,   `rgba(15,20,40,0.92)`);
        veilGrad.addColorStop(0.7, `rgba(15,20,40,0.6)`);
        veilGrad.addColorStop(1,   `rgba(15,20,40,0)`);
        cctx.beginPath();
        cctx.arc(cx, cy, moonR * 1.6, 0, Math.PI * 2);
        cctx.fillStyle = veilGrad;
        cctx.fill();
        cctx.restore();
      }

      // クローバーをフェードイン（t > 0.3 から）
      if(t > 0.28){
        const cloverAlpha = Math.min((t - 0.28) / 0.55, 1);
        const cloverR = moonR * 0.62 * (0.35 + 0.65 * Math.min((t-0.28)/0.4, 1));
        // cy + moonR*0.3 → 花頭が月の中心付近、茎が下方へ伸びる配置
        drawCloverShape(cctx, cx, cy + moonR * 0.3, cloverR, cloverAlpha);
      }

      if(t < 1){
        requestAnimationFrame(animFrame);
      } else {
        // 変化完了 → しばらく表示してからタップ待ちへ
        setLine('Something gentle, blooming here.', '');
        setTimeout(()=>{
          // クローバーをゆっくりフェードアウト
          let fadeT = 0;
          function fadeOut(){
            fadeT += 0.006;
            cctx.clearRect(0, 0, W, H);
            if(fadeT < 1){
              const a = 1 - fadeT;
              // ベール維持
              const veilGrad = cctx.createRadialGradient(cx, cy, 0, cx, cy, moonR * 1.6);
              veilGrad.addColorStop(0,   `rgba(15,20,40,${0.92 * a})`);
              veilGrad.addColorStop(0.7, `rgba(15,20,40,${0.6 * a})`);
              veilGrad.addColorStop(1,   `rgba(15,20,40,0)`);
              cctx.save();
              cctx.beginPath();
              cctx.arc(cx, cy, moonR * 1.6, 0, Math.PI * 2);
              cctx.fillStyle = veilGrad;
              cctx.fill();
              cctx.restore();
              drawCloverShape(cctx, cx, cy + moonR*0.3, moonR*0.62, a);
              requestAnimationFrame(fadeOut);
            } else {
              cctx.clearRect(0, 0, W, H);
              tapHint.classList.add('show');
              scene = 'berries-wait';
            }
          }
          requestAnimationFrame(fadeOut);
        }, 12000);
      }
    }
    requestAnimationFrame(animFrame);
  }

  function goRelease(){
    scene='release';
    tapHint.classList.remove('show');
    moonEl.classList.add('lit');
    setLine('Letting it all go, gently.', 'A release of love');
    const mr = moonRect();
    const cx = mr.left + mr.width/2;
    const cy = mr.top + mr.height/2;

    // 既存のベリーを解放パーティクルへ変換
    const berryPositions = particles.filter(p=>p.type==='berry').map(p=>({x:p.x,y:p.y}));
    particles = particles.filter(p=>p.type!=='berry');
    berryPositions.forEach(p=> spawnRelease(p.x, p.y, true));

    let bursts = 0;
    const burstInterval = setInterval(()=>{
      for(let i=0;i<3;i++){
        spawnRelease(
          cx + (Math.random()-0.5)*mr.width*0.6,
          cy + (Math.random()-0.5)*mr.height*0.6,
          false
        );
      }
      bursts++;
      if(bursts>18) clearInterval(burstInterval);
    }, 160);

    setTimeout(()=>{
      moonEl.classList.remove('lit');
      goClosing();
    }, 5200);
  }

  function goClosing(){
    scene='closing';
    setLine('The moon remains, just as it is.', '');
    setTimeout(()=>{
      if(isFullMoonNight()){
        offerHiddenScene();
      } else {
        tapHint.classList.add('show');

      }
    }, 3200);
  }

  // ---------- 満月判定（既知の新月を基準に朔望月で計算）----------
  function isFullMoonNight(date){
    date = date || new Date();
    const synodicMonth = 29.530588853;
    const knownNewMoon = Date.UTC(2000,0,6,18,14,0); // 2000-01-06 18:14 UTC
    const diffDays = (date.getTime() - knownNewMoon) / 86400000;
    const phase = ((diffDays % synodicMonth) + synodicMonth) % synodicMonth; // 0=新月, 半分=満月
    const distFromFull = Math.abs(phase - synodicMonth/2);
    return distFromFull < 1.0; // 満月の前後1日以内
  }

  const hiddenScene = document.getElementById('hidden-scene');
  const soundToggle = document.getElementById('sound-toggle');
  const furusatoAudio = document.getElementById('furusato-audio');
  let audioPlaying = false;

  // ---------- ハイランド情景 canvas ----------
  const highlandCanvas = document.getElementById('highland-canvas');
  const hctx = highlandCanvas.getContext('2d');
  let highlandRAF = null;

  function resizeHighland(){
    const dpr = Math.min(window.devicePixelRatio||1, 2);
    highlandCanvas.width  = window.innerWidth  * dpr;
    highlandCanvas.height = window.innerHeight * dpr;
    highlandCanvas.style.width  = window.innerWidth  + 'px';
    highlandCanvas.style.height = window.innerHeight + 'px';
    hctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  }
  window.addEventListener('resize', resizeHighland);
  resizeHighland();

  function drawHighlandScene(t){
    const w = window.innerWidth;
    const h = window.innerHeight;
    hctx.clearRect(0, 0, w, h);

    // ── 夜空グラデーション（上：深い紺 / 下：紫がかった濃紺）──
    const sky = hctx.createLinearGradient(0, 0, 0, h);
    sky.addColorStop(0,   'rgba(8,12,28,0.98)');
    sky.addColorStop(0.45,'rgba(15,20,48,0.97)');
    sky.addColorStop(0.72,'rgba(22,28,58,0.93)');
    sky.addColorStop(1,   'rgba(10,14,30,0.97)');
    hctx.fillStyle = sky;
    hctx.fillRect(0, 0, w, h);

    // ── 満月の光が地平線に落ちる moonbeam ──
    const moonX = w * 0.5;
    const moonY = h * 0.22;
    const beam = hctx.createRadialGradient(moonX, moonY, 0, moonX, moonY + h*0.35, h*0.7);
    beam.addColorStop(0,   'rgba(240,235,200,0.10)');
    beam.addColorStop(0.4, 'rgba(200,210,230,0.05)');
    beam.addColorStop(1,   'rgba(100,120,180,0)');
    hctx.fillStyle = beam;
    hctx.fillRect(0, 0, w, h);

    // ── 霧（遠景：うっすらかかる白い靄）──
    const fogY = h * 0.55;
    const fog1 = hctx.createLinearGradient(0, fogY - h*0.08, 0, fogY + h*0.06);
    fog1.addColorStop(0,   'rgba(195,205,225,0)');
    fog1.addColorStop(0.4, 'rgba(195,205,225,0.13)');
    fog1.addColorStop(1,   'rgba(195,205,225,0)');
    hctx.fillStyle = fog1;
    hctx.fillRect(0, fogY - h*0.08, w, h*0.14);

    // ── ハイランドの丘々（3層・奥から手前）──
    function drawHill(pts, color){
      hctx.beginPath();
      hctx.moveTo(0, h);
      pts.forEach((p, i)=>{
        if(i===0) hctx.lineTo(p[0]*w, p[1]*h);
        else {
          const prev = pts[i-1];
          const cpx = (prev[0]*w + p[0]*w)/2;
          hctx.bezierCurveTo(cpx, prev[1]*h, cpx, p[1]*h, p[0]*w, p[1]*h);
        }
      });
      hctx.lineTo(w, h);
      hctx.closePath();
      hctx.fillStyle = color;
      hctx.fill();
    }

    // 最遠景の丘（薄い青紫・ハイランドの山稜）
    drawHill([
      [0,0.62],[0.08,0.54],[0.18,0.48],[0.28,0.52],[0.38,0.45],
      [0.50,0.50],[0.62,0.44],[0.74,0.49],[0.85,0.46],[1.0,0.55]
    ], 'rgba(55,62,105,0.72)');

    // 中景の丘（やや緑がかった濃紺）
    drawHill([
      [0,0.72],[0.06,0.66],[0.15,0.60],[0.26,0.65],[0.36,0.58],
      [0.48,0.63],[0.60,0.57],[0.72,0.62],[0.84,0.58],[1.0,0.68]
    ], 'rgba(38,48,78,0.85)');

    // 前景の丘（最も暗い・緑みがかった黒）
    drawHill([
      [0,0.82],[0.05,0.77],[0.14,0.73],[0.25,0.76],[0.35,0.71],
      [0.46,0.75],[0.58,0.70],[0.70,0.74],[0.82,0.71],[0.92,0.75],[1.0,0.80]
    ], 'rgba(22,30,48,0.95)');

    // ── ヒース（heather）：前景丘の上に小さな紫の点群 ──
    const hillTopY = h * 0.70;
    // 揺らぎ用 seed（毎フレーム固定でOK）
    const heatherSeeds = [
      [0.08,0.75],[0.14,0.72],[0.20,0.74],[0.28,0.71],[0.35,0.73],
      [0.42,0.70],[0.50,0.72],[0.57,0.71],[0.64,0.73],[0.71,0.71],
      [0.78,0.72],[0.85,0.73],[0.92,0.74],[0.04,0.78],[0.32,0.76],
      [0.60,0.75],[0.88,0.77],[0.22,0.77],[0.48,0.76],[0.75,0.75]
    ];
    heatherSeeds.forEach((s, idx)=>{
      const hx = s[0]*w;
      const hy = s[1]*h + Math.sin(t*0.7 + idx)*1.2;
      const swing = Math.sin(t*0.9 + idx*1.3) * 1.5;
      // 茎
      hctx.save();
      hctx.strokeStyle = 'rgba(90,110,70,0.55)';
      hctx.lineWidth = 1.2;
      hctx.beginPath();
      hctx.moveTo(hx, hy + 10);
      hctx.lineTo(hx + swing, hy);
      hctx.stroke();
      // 花（小さい紫点）
      const hGrad = hctx.createRadialGradient(hx+swing, hy-2, 0, hx+swing, hy-2, 5);
      hGrad.addColorStop(0, 'rgba(195,140,205,0.88)');
      hGrad.addColorStop(1, 'rgba(145, 85,175,0)');
      hctx.fillStyle = hGrad;
      hctx.beginPath();
      hctx.arc(hx+swing, hy-2, 5, 0, Math.PI*2);
      hctx.fill();
      hctx.restore();
    });

    // ── ススキ（日本側・右寄りに群生）──
    const susukiRoots = [];
    for(let i=0;i<32;i++){
      // 右寄りに密集、左に少し
      const xRatio = i < 22 ? 0.55 + (i/22)*0.45 : (i-22)/10*0.3;
      susukiRoots.push({ x: xRatio, baseY: 0.92 + Math.sin(i*2.3)*0.04 });
    }
    susukiRoots.forEach((s, idx)=>{
      const sx = s.x * w;
      const sy = s.baseY * h;
      const stemH = h * (0.14 + Math.sin(idx*1.7)*0.04);
      const sw = Math.sin(t * 0.6 + idx * 0.8) * (stemH * 0.06);
      const sw2 = Math.sin(t * 0.55 + idx * 0.9 + 1) * (stemH * 0.04);

      // 茎
      hctx.save();
      hctx.strokeStyle = `rgba(175,168,130,${0.5 + Math.sin(idx)*0.15})`;
      hctx.lineWidth = 1.0;
      hctx.lineCap = 'round';
      hctx.beginPath();
      hctx.moveTo(sx, sy);
      hctx.bezierCurveTo(sx + sw*0.4, sy - stemH*0.5, sx + sw, sy - stemH*0.85, sx + sw + sw2, sy - stemH);
      hctx.stroke();

      // 穂（楕円でふっくら）
      const tipX = sx + sw + sw2;
      const tipY = sy - stemH;
      const spGrad = hctx.createRadialGradient(tipX, tipY+4, 0, tipX, tipY, 9);
      spGrad.addColorStop(0,   `rgba(225,218,185,${0.65 + Math.sin(idx)*0.1})`);
      spGrad.addColorStop(0.5, `rgba(195,185,148,0.45)`);
      spGrad.addColorStop(1,   'rgba(160,150,115,0)');
      hctx.fillStyle = spGrad;
      hctx.beginPath();
      hctx.ellipse(tipX, tipY + 3, 4.5, 10, Math.sin(t*0.5+idx)*0.15, 0, Math.PI*2);
      hctx.fill();
      hctx.restore();
    });

    // ── 霧（手前・地面に漂う）──
    const groundFogY = h * 0.78;
    for(let fi=0;fi<3;fi++){
      const fy2 = groundFogY + fi * h*0.055;
      const fopac = [0.12, 0.09, 0.06][fi];
      const ffog = hctx.createLinearGradient(0, fy2 - h*0.04, 0, fy2 + h*0.05);
      ffog.addColorStop(0,   `rgba(185,195,220,0)`);
      ffog.addColorStop(0.45,`rgba(185,195,220,${fopac + Math.sin(t*0.3+fi)*0.015})`);
      ffog.addColorStop(1,   `rgba(185,195,220,0)`);
      hctx.fillStyle = ffog;
      hctx.fillRect(0, fy2 - h*0.04, w, h*0.09);
    }

    // ── 石積みの塀（ドライストーン・ウォール）──
    const wallY = h * 0.84;
    const wallH = h * 0.028;
    hctx.save();
    hctx.fillStyle = 'rgba(52,58,72,0.82)';
    hctx.beginPath();
    hctx.rect(0, wallY, w * 0.48, wallH);
    hctx.fill();
    // 石の目地（横線）
    hctx.strokeStyle = 'rgba(30,36,52,0.6)';
    hctx.lineWidth = 0.8;
    for(let r=0;r<3;r++){
      hctx.beginPath();
      hctx.moveTo(0, wallY + r*(wallH/3));
      hctx.lineTo(w*0.48, wallY + r*(wallH/3));
      hctx.stroke();
    }
    // 縦目地（ランダム）
    [0.06,0.13,0.19,0.26,0.31,0.38,0.44].forEach(xr=>{
      const jy = wallY + (Math.floor(xr*100)%2)*(wallH/3);
      hctx.beginPath();
      hctx.moveTo(xr*w, jy);
      hctx.lineTo(xr*w, jy + wallH/3);
      hctx.stroke();
    });
    hctx.restore();

    // ── 月明かりの水面反射（池）──
    const pondX = w*0.3;
    const pondY = h*0.87;
    const refGrad = hctx.createRadialGradient(pondX, pondY, 0, pondX, pondY, w*0.08);
    refGrad.addColorStop(0,   `rgba(220,228,200,${0.18 + Math.sin(t*1.2)*0.03})`);
    refGrad.addColorStop(0.5, 'rgba(180,195,220,0.07)');
    refGrad.addColorStop(1,   'rgba(140,165,200,0)');
    hctx.save();
    hctx.scale(1, 0.32);
    hctx.fillStyle = refGrad;
    hctx.beginPath();
    hctx.ellipse(pondX, pondY/0.32, w*0.08, w*0.08, 0, 0, Math.PI*2);
    hctx.fill();
    hctx.restore();

    // ── シルエット（踊る人影・左寄り2人）──
    function drawFigure(fx2, fy2, scale, phase){
      hctx.save();
      hctx.translate(fx2, fy2);
      hctx.scale(scale, scale);
      const sway2 = Math.sin(t*1.4 + phase) * 4;
      const armSwing = Math.sin(t*1.4 + phase) * 0.35;
      hctx.fillStyle = 'rgba(15,18,32,0.88)';
      hctx.strokeStyle = 'rgba(15,18,32,0.88)';
      hctx.lineWidth = 2.8;
      hctx.lineCap = 'round';
      // 頭
      hctx.beginPath();
      hctx.arc(sway2*0.3, -48, 7, 0, Math.PI*2);
      hctx.fill();
      // 胴体
      hctx.beginPath();
      hctx.moveTo(sway2*0.3, -41);
      hctx.lineTo(sway2*0.1, -18);
      hctx.stroke();
      // 左腕
      hctx.beginPath();
      hctx.moveTo(sway2*0.2, -36);
      hctx.lineTo(sway2*0.2 - 14*Math.cos(armSwing), -36 + 14*Math.sin(armSwing) - 8);
      hctx.stroke();
      // 右腕（持ち上げ）
      hctx.beginPath();
      hctx.moveTo(sway2*0.2, -36);
      hctx.lineTo(sway2*0.2 + 16*Math.cos(armSwing+0.5), -36 - 14*Math.sin(armSwing+0.5));
      hctx.stroke();
      // 脚
      const legSwing = Math.sin(t*1.4 + phase) * 0.3;
      hctx.beginPath();
      hctx.moveTo(sway2*0.1, -18);
      hctx.lineTo(sway2*0.1 - 8*Math.sin(legSwing), 0);
      hctx.stroke();
      hctx.beginPath();
      hctx.moveTo(sway2*0.1, -18);
      hctx.lineTo(sway2*0.1 + 10*Math.sin(legSwing+0.4), 0);
      hctx.stroke();
      hctx.restore();
    }

    drawFigure(w*0.15, h*0.83, h/700, 0);
    drawFigure(w*0.20, h*0.83, h/700, Math.PI*0.7);

    // ── 画面上部：夜空に浮かぶ雲の切れ間 ──
    const cloudAlpha = 0.06 + Math.sin(t*0.18)*0.02;
    for(let ci=0;ci<4;ci++){
      const cx2 = w*(0.1 + ci*0.25 + Math.sin(t*0.05+ci)*0.03);
      const cy2 = h*(0.12 + Math.sin(ci*1.3)*0.06);
      const cloudGrad = hctx.createRadialGradient(cx2, cy2, 0, cx2, cy2, w*0.12);
      cloudGrad.addColorStop(0,   `rgba(180,190,215,${cloudAlpha})`);
      cloudGrad.addColorStop(1,   'rgba(140,155,195,0)');
      hctx.fillStyle = cloudGrad;
      hctx.beginPath();
      hctx.ellipse(cx2, cy2, w*0.12, h*0.04, 0, 0, Math.PI*2);
      hctx.fill();
    }

    // ── 最前景の暗いシルエット草むら ──
    hctx.fillStyle = 'rgba(8,10,20,0.92)';
    hctx.beginPath();
    hctx.moveTo(0, h);
    const grassPts = [
      [0,0.95],[0.03,0.90],[0.06,0.94],[0.09,0.88],[0.12,0.93],
      [0.16,0.87],[0.20,0.92],[0.25,0.88],[0.30,0.93],[0.36,0.87],
      [0.42,0.91],[0.48,0.88],[0.54,0.93],[0.60,0.87],[0.66,0.92],
      [0.72,0.88],[0.78,0.93],[0.84,0.88],[0.90,0.93],[0.95,0.89],[1.0,0.94]
    ];
    grassPts.forEach(p=> hctx.lineTo(p[0]*w, p[1]*h));
    hctx.lineTo(w, h);
    hctx.closePath();
    hctx.fill();
  }

  function offerHiddenScene(){
    scene='hidden-offer';
    setLine('A somewhat special night.', 'Would you like to gently touch it?');
    tapHint.classList.add('show');
  }

  function revealHiddenScene(){
    scene='hidden';
    tapHint.classList.remove('show');
    setLine('', '');
    hiddenScene.classList.add('show');
    // ハイランドシーンのアニメーションループ開始
    if(highlandRAF) cancelAnimationFrame(highlandRAF);
    let hStart = null;
    function hLoop(ts){
      if(!hStart) hStart = ts;
      drawHighlandScene((ts - hStart)/1000);
      highlandRAF = requestAnimationFrame(hLoop);
    }
    highlandRAF = requestAnimationFrame(hLoop);
  }

  soundToggle.addEventListener('click', (e)=>{
    e.stopPropagation();
    if(!audioPlaying){
      furusatoAudio.play().then(()=>{
        audioPlaying = true;
        soundToggle.textContent = 'Stop, softly';
      }).catch(()=>{
        // if public/audio/furusato-no-sora.mp3 doesn't exist yet, fail silently
        soundToggle.textContent = '(there is no sound yet)';
      });
    } else {
      furusatoAudio.pause();
      furusatoAudio.currentTime = 0;
      audioPlaying = false;
      soundToggle.textContent = 'Listen, softly';
    }
  });

  // ---------- 入力イベント ----------
  document.getElementById('btn-write').addEventListener('click', (e)=>{
    e.stopPropagation();
    goWriting();
  });
  document.getElementById('btn-close').addEventListener('click', (e)=>{
    e.stopPropagation();
    finishWithWord('');
  });
  submitWord.addEventListener('click', (e)=>{
    e.stopPropagation();
    finishWithWord(wordInput.value);
  });
  wordInput.addEventListener('keydown', (e)=>{
    if(e.key === 'Enter'){ finishWithWord(wordInput.value); }
  });
  wordInput.addEventListener('click', (e)=> e.stopPropagation());

  stage.addEventListener('click', (e)=>{
    if(e.target.closest('#choice-row') || e.target.closest('#input-row') || e.target.closest('#hidden-scene')) return;
    if(scene==='intro') goPrompt();
    else if(scene==='berries-wait') goRelease();
    else if(scene==='hidden-offer') revealHiddenScene();
    else if(scene==='hidden' || scene==='end') goIntro();
  });

  // 起動
  setTimeout(goIntro, 400);
})();
</script>
</body>
